<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCRI Terminal - インバウンド観光需要予測</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0f;
  color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  overflow-y: auto;
}

/* ===== ヘッダー ===== */
.terminal-header {
  background: #0d1117;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.terminal-header .logo {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-weight: 700;
  color: #3b82f6;
  letter-spacing: 0.05em;
}
.terminal-header .title {
  color: #94a3b8;
  font-weight: 400;
}
.terminal-header .live-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #22c55e;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}
.terminal-header .live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #22c55e;
  animation: blink 1.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ===== メインコンテナ ===== */
.page-content {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* ===== 全国サマリーカード ===== */
.national-summary {
  background: #0d1117;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 24px;
  margin-bottom: 20px;
}
.national-headline {
  font-size: 13px;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.national-value {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 36px;
  font-weight: 700;
  color: #3b82f6;
  letter-spacing: -0.02em;
}
.national-value .unit {
  font-size: 16px;
  font-weight: 400;
  color: #64748b;
  margin-left: 4px;
}

/* 非対称バー */
.asymmetric-bar-container {
  margin-top: 20px;
  padding: 0 10px;
}
.asymmetric-bar-labels {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  margin-bottom: 6px;
}
.bar-label-left {
  color: #ef4444;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-weight: 600;
}
.bar-label-center {
  color: #3b82f6;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-weight: 600;
}
.bar-label-right {
  color: #22c55e;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-weight: 600;
}
.asymmetric-bar-track {
  position: relative;
  height: 32px;
  background: #1e293b;
  border-radius: 6px;
  overflow: hidden;
  display: flex;
}
.bar-downside {
  height: 100%;
  background: linear-gradient(90deg, rgba(239,68,68,0.15), rgba(239,68,68,0.35));
  border-right: 2px solid #3b82f6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  color: #f87171;
  font-weight: 500;
}
.bar-upside {
  height: 100%;
  background: linear-gradient(90deg, rgba(34,197,94,0.35), rgba(34,197,94,0.15));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  color: #4ade80;
  font-weight: 500;
}
.bar-center-marker {
  position: absolute;
  top: 0;
  width: 3px;
  height: 100%;
  background: #3b82f6;
  z-index: 2;
}
.asymmetric-bar-footer {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #64748b;
  margin-top: 4px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

/* ===== 下振れ・上振れ要因 ===== */
.factors-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
@media (max-width: 768px) {
  .factors-grid { grid-template-columns: 1fr; }
}
.factor-panel {
  background: #0d1117;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 16px 20px;
}
.factor-panel.downside { border-left: 3px solid #ef4444; }
.factor-panel.upside { border-left: 3px solid #22c55e; }
.factor-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.factor-title.down-title { color: #f87171; }
.factor-title.up-title { color: #4ade80; }
.factor-total {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  font-weight: 400;
  color: #94a3b8;
  margin-left: auto;
}
.factor-row {
  display: flex;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 12px;
}
.factor-row:last-child { border-bottom: none; }
.factor-var {
  width: 160px;
  color: #e2e8f0;
  font-weight: 500;
  flex-shrink: 0;
}
.factor-change {
  width: 100px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  color: #94a3b8;
  flex-shrink: 0;
}
.factor-arrow {
  color: #475569;
  margin: 0 8px;
  flex-shrink: 0;
}
.factor-target {
  width: 60px;
  font-size: 11px;
  color: #64748b;
  flex-shrink: 0;
}
.factor-impact {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
}
.factor-impact.neg { color: #f87171; }
.factor-impact.pos { color: #4ade80; }
.factor-bar-wrap {
  flex: 1;
  height: 4px;
  background: #1e293b;
  border-radius: 2px;
  margin-left: 8px;
  min-width: 40px;
  overflow: hidden;
}
.factor-bar-fill {
  height: 100%;
  border-radius: 2px;
}
.factor-bar-fill.neg { background: #ef4444; }
.factor-bar-fill.pos { background: #22c55e; }

/* ===== チャートセクション ===== */
.chart-section {
  background: #0d1117;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 20px;
}
.chart-section-title {
  font-size: 13px;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}
.chart-stats-row {
  display: flex;
  gap: 32px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.chart-stat {
  display: flex;
  flex-direction: column;
}
.chart-stat-label {
  font-size: 10px;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.chart-stat-value {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.chart-stat-value.base-val { color: #3b82f6; }
.chart-stat-value.pessimistic-val { color: #ef4444; }
.chart-stat-value.optimistic-val { color: #22c55e; }
.chart-stat-value.band-val { color: #eab308; }
.chart-container {
  position: relative;
  height: 350px;
}
.chart-container canvas {
  width: 100% !important;
  height: 100% !important;
}

/* ===== ソート可能テーブル ===== */
.table-section {
  background: #0d1117;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 20px;
}
.table-section-title {
  font-size: 13px;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.data-table th {
  text-align: left;
  padding: 8px 12px;
  color: #64748b;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  transition: color 0.15s;
}
.data-table th:hover { color: #94a3b8; }
.data-table th.sorted { color: #3b82f6; }
.sort-arrow {
  font-size: 9px;
  margin-left: 4px;
  opacity: 0.5;
}
.data-table th.sorted .sort-arrow { opacity: 1; }
.data-table td {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  vertical-align: middle;
}
.data-table tr:hover td {
  background: rgba(255,255,255,0.02);
}
.td-name {
  font-weight: 600;
  color: #e2e8f0;
}
.td-name a {
  color: #e2e8f0;
  text-decoration: none;
}
.td-name a:hover {
  color: #3b82f6;
  text-decoration: underline;
}
.td-mono {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-weight: 500;
}
.td-neg { color: #f87171; }
.td-pos { color: #4ade80; }
.td-muted { color: #94a3b8; }
.td-risk-tag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 500;
}
.risk-high { background: rgba(239,68,68,0.15); color: #f87171; }
.risk-med  { background: rgba(234,179,8,0.15); color: #facc15; }
.risk-low  { background: rgba(34,197,94,0.15); color: #4ade80; }

/* ミニバー */
.mini-asym-bar {
  display: flex;
  align-items: center;
  gap: 2px;
  height: 12px;
}
.mini-bar-down {
  height: 8px;
  background: rgba(239,68,68,0.4);
  border-radius: 2px 0 0 2px;
}
.mini-bar-up {
  height: 8px;
  background: rgba(34,197,94,0.4);
  border-radius: 0 2px 2px 0;
}
.mini-bar-center {
  width: 2px;
  height: 12px;
  background: #3b82f6;
  flex-shrink: 0;
}

/* ===== ステータスバー ===== */
.status-bar {
  background: #0d1117;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 6px 16px;
  font-size: 10px;
  color: #475569;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}
.status-item { white-space: nowrap; }
.status-item .status-label { color: #334155; }
.status-item .status-value { color: #64748b; }
</style>
</head>

  </div>
</div>

<div class="status-bar" id="status-bar"></div>

/* =============================================================
   ユーティリティ関数
   ============================================================= */

function fmtMan(v) {
  /* 万人単位でフォーマット */
  try {
    if (Math.abs(v) >= 100) return Math.round(v) + '万人';
    if (Math.abs(v) >= 10) return v.toFixed(1) + '万人';
    return v.toFixed(2) + '万人';
  } catch(e) { return '-'; }
}

function fmtManShort(v) {
  try {
    if (Math.abs(v) >= 100) return Math.round(v) + '万';
    if (Math.abs(v) >= 10) return v.toFixed(1) + '万';
    return v.toFixed(2) + '万';
  } catch(e) { return '-'; }
}

function fmtPct(v) {
  try {
    var sign = v >= 0 ? '+' : '';
    return sign + v.toFixed(1) + '%';
  } catch(e) { return '-'; }
}

function fmtSign(v) {
  try {
    if (Math.abs(v) >= 100) return (v >= 0 ? '+' : '') + Math.round(v) + '万人';
    if (Math.abs(v) >= 10) return (v >= 0 ? '+' : '') + v.toFixed(1) + '万人';
    return (v >= 0 ? '+' : '') + v.toFixed(2) + '万人';
  } catch(e) { return '-'; }
}

/* 全国合計を計算 */
function calcNational() {
  try {
    var base = 0, p10 = 0, p90 = 0;
    var keys = Object.keys(COUNTRY_DATA);
    for (var i = 0; i < keys.length; i++) {
      var c = COUNTRY_DATA[keys[i]];
      base += c.base;
      p10 += c.p10;
      p90 += c.p90;
    }
    return {
      base: base,
      p10: p10,
      p90: p90,
      downside: base - p10,
      upside: p90 - base,
      downsidePct: (p10 - base) / base * 100,
      upsidePct: (p90 - base) / base * 100,
      bandPct: (p90 - p10) / base * 100
    };
  } catch(e) { return {base:242,p10:212,p90:275,downside:30,upside:33,downsidePct:-12.4,upsidePct:13.6,bandPct:26.0}; }
}

/* 都道府県別予測を計算 */
function calcPrefForecast(pref) {
  try {
    var base = 0, p10 = 0, p90 = 0;
    var keys = Object.keys(COUNTRY_DATA);
    for (var i = 0; i < keys.length; i++) {
      var cCode = keys[i];
      var c = COUNTRY_DATA[cCode];
      var share = (PREF_SHARE[cCode] || {})[pref] || 0.02;
      base += c.base * share;
      p10 += c.p10 * share;
      p90 += c.p90 * share;
    }
    return {
      name: pref,
      base: base,
      p10: p10,
      p90: p90,
      downside: base - p10,
      upside: p90 - base,
      bandPct: (p90 - p10) / base * 100
    };
  } catch(e) { return {name:pref, base:0, p10:0, p90:0, downside:0, upside:0, bandPct:0}; }
}


/* =============================================================

   ============================================================= */
function updateClock() {
  try {
    var now = new Date();
    var jst = new Date(now.getTime() + (9 * 60 - now.getTimezoneOffset()) * 60000);
    var h = jst.getHours();
    var m = jst.getMinutes();
    var s = jst.getSeconds();
    var hh = h < 10 ? '0' + h : '' + h;
    var mm = m < 10 ? '0' + m : '' + m;
    var ss = s < 10 ? '0' + s : '' + s;
    document.getElementById('clock').textContent = hh + ':' + mm + ':' + ss + ' JST';
  } catch(e) {}
}

var countrySortKey = 'base';
var countrySortAsc = false;

function sortCountryTable(key) {
  try {
    if (countrySortKey === key) {
      countrySortAsc = !countrySortAsc;
    } else {
      countrySortKey = key;
      countrySortAsc = false;
    }
    renderCountryTable();
  } catch(e) {}
}

function renderCountryTable() {
  try {
    var keys = Object.keys(COUNTRY_DATA);
    var rows = [];
    for (var i = 0; i < keys.length; i++) {
      var c = COUNTRY_DATA[keys[i]];
      rows.push({
        code: c.code,
        name: c.name,
        flag: c.flag,
        base: c.base,
        downside: c.base - c.p10,
        upside: c.p90 - c.base,
        bandPct: (c.p90 - c.p10) / c.base * 100,
        risk: c.risk,
        p10: c.p10,
        p90: c.p90
      });
    }

    rows.sort(function(a, b) {
      var va = a[countrySortKey];
      var vb = b[countrySortKey];
      if (typeof va === 'string') {
        return countrySortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
      }
      return countrySortAsc ? va - vb : vb - va;
    });

    var thCols = [
      {key:'name', label:'国'},
      {key:'base', label:'ベース'},
      {key:'downside', label:'下振れ'},
      {key:'upside', label:'上振れ'},
      {key:'bandPct', label:'帯幅%'},
      {key:'_bar', label:'分布'},
      {key:'risk', label:'主要リスク'}
    ];

    var html = '<thead><tr>';
    for (var t = 0; t < thCols.length; t++) {
      var col = thCols[t];
      if (col.key === '_bar') {
        html += '<th>' + col.label + '</th>';
      } else {
        var sorted = countrySortKey === col.key ? ' sorted' : '';
        var arrow = countrySortKey === col.key ? (countrySortAsc ? '\u25B2' : '\u25BC') : '\u25BC';
        html += '<th class="' + sorted + '" onclick="sortCountryTable(\'' + col.key + '\')">';
        html += col.label + '<span class="sort-arrow">' + arrow + '</span></th>';
      }
    }
    html += '</tr></thead><tbody>';

    /* ミニバー最大幅の算出 */
    var maxBand = 0;
    for (var j = 0; j < rows.length; j++) {
      var band = rows[j].downside + rows[j].upside;
      if (band > maxBand) maxBand = band;
    }

    for (var r = 0; r < rows.length; r++) {
      var row = rows[r];
      var riskClass = row.bandPct >= 45 ? 'risk-high' : (row.bandPct >= 30 ? 'risk-med' : 'risk-low');
      var downW = maxBand > 0 ? (row.downside / maxBand * 60).toFixed(0) : 0;
      var upW = maxBand > 0 ? (row.upside / maxBand * 60).toFixed(0) : 0;

      html += '<tr>';
      html += '<td class="td-name"><a href="inbound-detail.html?country=' + row.code + '">' + row.flag + ' ' + row.name + '</a></td>';
      html += '<td class="td-mono">' + row.base.toFixed(1) + '万</td>';
      html += '<td class="td-mono td-neg">-' + row.downside.toFixed(1) + '万</td>';
      html += '<td class="td-mono td-pos">+' + row.upside.toFixed(1) + '万</td>';
      html += '<td class="td-mono"><span class="td-risk-tag ' + riskClass + '">' + row.bandPct.toFixed(1) + '%</span></td>';
      html += '<td><div class="mini-asym-bar">';
      html += '<div class="mini-bar-down" style="width:' + downW + 'px"></div>';
      html += '<div class="mini-bar-center"></div>';
      html += '<div class="mini-bar-up" style="width:' + upW + 'px"></div>';
      html += '</div></td>';
      html += '<td class="td-muted">' + row.risk + '</td>';
      html += '</tr>';
    }
    html += '</tbody>';

    document.getElementById('country-table').innerHTML = html;
  } catch(e) { console.error('renderCountryTable:', e); }
}

        html += '<th>' + col.label + '</th>';
      } else {
        var sorted = prefSortKey === col.key ? ' sorted' : '';
        var arrow = prefSortKey === col.key ? (prefSortAsc ? '\u25B2' : '\u25BC') : '\u25BC';
        html += '<th class="' + sorted + '" onclick="sortPrefTable(\'' + col.key + '\')">';
        html += col.label + '<span class="sort-arrow">' + arrow + '</span></th>';
      }
    }
    html += '</tr></thead><tbody>';

    /* ミニバーの最大幅 */
    var maxBand = 0;
    for (var j = 0; j < rows.length; j++) {
      var band = rows[j].downside + rows[j].upside;
      if (band > maxBand) maxBand = band;
    }

    for (var r = 0; r < rows.length; r++) {
      var row = rows[r];
      var riskClass = row.bandPct >= 35 ? 'risk-high' : (row.bandPct >= 28 ? 'risk-med' : 'risk-low');
      var downW = maxBand > 0 ? (row.downside / maxBand * 60).toFixed(0) : 0;
      var upW = maxBand > 0 ? (row.upside / maxBand * 60).toFixed(0) : 0;

      html += '<tr>';
      html += '<td class="td-name">' + row.name + '</td>';
      html += '<td class="td-mono">' + row.base.toFixed(1) + '万</td>';
      html += '<td class="td-mono td-neg">-' + row.downside.toFixed(1) + '万</td>';
      html += '<td class="td-mono td-pos">+' + row.upside.toFixed(1) + '万</td>';
      html += '<td class="td-mono"><span class="td-risk-tag ' + riskClass + '">' + row.bandPct.toFixed(1) + '%</span></td>';
      html += '<td><div class="mini-asym-bar">';
      html += '<div class="mini-bar-down" style="width:' + downW + 'px"></div>';
      html += '<div class="mini-bar-center"></div>';
      html += '<div class="mini-bar-up" style="width:' + upW + 'px"></div>';
      html += '</div></td>';
      html += '</tr>';
    }
    html += '</tbody>';

    document.getElementById('pref-table').innerHTML = html;
  } catch(e) { console.error('renderPrefTable:', e); }
}


/* =============================================================
   ステータスバー
   ============================================================= */
function renderStatusBar() {
  try {
    var n = calcNational();
    var asymRatio = (n.upside / n.downside).toFixed(2);
    var items = [
      {label:'model', value:'full_mc_29vars'},
      {label:'N', value:'3,000'},
      {label:'変数', value:'29'},
      {label:'相関行列', value:'29\u00D729'},
      {label:'非対称比', value: asymRatio},
      {label:'帯幅', value: n.bandPct.toFixed(1) + '%'},
      {label:'国数', value: Object.keys(COUNTRY_DATA).length + ''}
    ];
    var html = '';
    for (var i = 0; i < items.length; i++) {
      html += '<span class="status-item"><span class="status-label">' + items[i].label + ': </span><span class="status-value">' + items[i].value + '</span></span>';
    }
    document.getElementById('status-bar').innerHTML = html;
  } catch(e) {}
}


/* =============================================================
   API読み込み (フォールバック上書き)
   ============================================================= */
function loadFromAPI() {
  try {
    var ctrl = new AbortController();
    var timer = setTimeout(function(){ ctrl.abort(); }, 8000);
    fetch('/api/v1/tourism/three-scenarios?source_country=ALL', {signal: ctrl.signal})
      .then(function(r) { clearTimeout(timer); if(!r.ok) throw new Error(r.status); return r.json(); })
      .then(function(json) {
        try {
          var d = json.data || json;
          var s = d.scenarios || {};
          var base = (s.base||{}).median || [];
          var p10 = (s.pessimistic||{}).median || (s.base||{}).p10 || [];
          var p90 = (s.optimistic||{}).median || (s.base||{}).p90 || [];
          if (base.length > 0 && mainChartInstance) {
            var ds = mainChartInstance.data.datasets;
            for (var i = 0; i < ds.length; i++) {
              var lb = ds[i].label || '';
              if (lb.indexOf('p10') >= 0 || lb.indexOf('悲観') >= 0) ds[i].data = p10.map(function(v){return Math.round(v/10000*10)/10;});
              else if (lb.indexOf('p90') >= 0 || lb.indexOf('楽観') >= 0) ds[i].data = p90.map(function(v){return Math.round(v/10000*10)/10;});
              else if (lb.indexOf('p50') >= 0 || lb.indexOf('ベース') >= 0) ds[i].data = base.map(function(v){return Math.round(v/10000*10)/10;});
            }
            mainChartInstance.update();
          }
        } catch(e) { console.warn('APIデータ処理:', e.message); }
      })
      .catch(function(e) { console.warn('API:', e.message); });
  } catch(e) { console.warn('API接続:', e.message); }
}


/* =============================================================
   初期化
   ============================================================= */
function init() {
  try {
    updateClock();
    setInterval(updateClock, 1000);
    renderNationalSummary();
    renderFactors();
    renderChartStats();
    renderMainChart();
    renderCountryTable();
    renderPrefTable();
    renderStatusBar();
  } catch(e) { console.error('init:', e); }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function(){ init(); loadFromAPI(); });
} else {
  init();
  loadFromAPI();
}
</script>
</body>
