<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCRI Logistics Risk Dashboard v1.5.0</title>

<style>
/* ===== リセット・グローバル ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f1117;
  color: #e8e6e0;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ===== ヘッダー ===== */
.header {
  background: linear-gradient(135deg, #0f1117 0%, #1a1d27 100%);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #2d2f3e;
  height: 48px;
  z-index: 100;
  position: relative;
}
.header-left { display: flex; align-items: center; gap: 20px; }
.header h1 { font-size: 16px; font-weight: 700; color: #f0f6fc; white-space: nowrap; }
.header h1 span.accent { color: #4a9eff; }
.header-controls { display: flex; align-items: center; gap: 12px; }
.header-select {
  background: #1a1d27;
  border: 1px solid #2d2f3e;
  color: #e8e6e0;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}
.header-select:focus { border-color: #4a9eff; outline: none; }
.mode-btn-group { display: flex; gap: 0; }
.mode-btn {
  padding: 5px 14px;
  border: 1px solid #2d2f3e;
  background: #1a1d27;
  color: #8b8fa8;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn:first-child { border-radius: 6px 0 0 6px; }
.mode-btn:last-child { border-radius: 0 6px 6px 0; }
.mode-btn:not(:first-child) { border-left: none; }
.mode-btn:hover { color: #e8e6e0; }
.mode-btn.active { background: rgba(74,158,255,0.15); border-color: #4a9eff; color: #4a9eff; }
.header .meta { font-size: 11px; color: #8b8fa8; text-align: right; white-space: nowrap; }

/* ===== メインレイアウト ===== */
.main-area {
  display: flex;
  height: calc(100vh - 48px - 72px); /* header + bottom bar */
}

/* ===== 地図コンテナ（左60%） ===== */
.map-container {
  flex: 6;
  position: relative;
  overflow: hidden;
  background: #0f1117;
}
svg.world-map { width: 100%; height: 100%; }

/* ===== 右パネル ===== */
.right-panel {
  flex: 4;
  min-width: 320px;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  border-left: 1px solid #2d2f3e;
  background: #1a1d27;
  overflow: hidden;
}

/* 右上: チョークポイント状況 */
.cp-status-panel {
  padding: 14px 16px;
  border-bottom: 1px solid #2d2f3e;
  overflow-y: auto;
  flex: 0 0 auto;
  max-height: 45%;
}
.cp-status-panel::-webkit-scrollbar { width: 5px; }
.cp-status-panel::-webkit-scrollbar-thumb { background: #2d2f3e; border-radius: 3px; }
.panel-title {
  font-size: 11px;
  font-weight: 700;
  color: #8b8fa8;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 10px;
}
.cp-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s;
  margin-bottom: 2px;
}
.cp-item:hover { background: rgba(74,158,255,0.08); }
.cp-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.cp-info { flex: 1; min-width: 0; }
.cp-name { font-size: 13px; font-weight: 600; color: #e8e6e0; }
.cp-status-text { font-size: 10px; color: #8b8fa8; }
.cp-risk-val { font-size: 16px; font-weight: 700; min-width: 32px; text-align: right; }

/* 右下: 選択ルートの詳細 */
.route-detail-panel {
  flex: 1;
  padding: 14px 16px;
  overflow-y: auto;
  min-height: 0;
}
.route-detail-panel::-webkit-scrollbar { width: 5px; }
.route-detail-panel::-webkit-scrollbar-thumb { background: #2d2f3e; border-radius: 3px; }
.route-detail-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #8b8fa8;
  font-size: 13px;
  text-align: center;
  line-height: 1.8;
}
.route-detail-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}
.route-detail-name { font-size: 15px; font-weight: 700; color: #f0f6fc; flex: 1; }
.route-detail-risk-badge {
  font-size: 22px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 6px;
  background: rgba(0,0,0,0.3);
}
.cp-breakdown { margin-bottom: 14px; }
.cp-breakdown-title { font-size: 11px; font-weight: 600; color: #8b8fa8; text-transform: uppercase; margin-bottom: 8px; }
.cp-bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.cp-bar-name { font-size: 12px; color: #e8e6e0; width: 120px; flex-shrink: 0; }
.cp-bar-track {
  flex: 1;
  height: 8px;
  background: #0f1117;
  border-radius: 4px;
  overflow: hidden;
}
.cp-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s ease;
}
.cp-bar-val { font-size: 12px; font-weight: 700; width: 30px; text-align: right; }
.alt-route-box {
  background: #0f1117;
  border: 1px solid #2d2f3e;
  border-radius: 8px;
  padding: 12px;
}
.alt-route-label { font-size: 11px; color: #8b8fa8; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
.alt-route-name { font-size: 14px; font-weight: 600; color: #ffd43b; margin-bottom: 6px; }
.alt-route-stats { display: flex; gap: 20px; }
.alt-stat { font-size: 12px; color: #e8e6e0; }
.alt-stat strong { color: #ffd43b; }

/* ===== 下部ルートランキングバー ===== */
.route-ranking-bar {
  height: 72px;
  background: #1a1d27;
  border-top: 1px solid #2d2f3e;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  overflow-x: auto;
  flex-shrink: 0;
}
.route-ranking-bar::-webkit-scrollbar { height: 4px; }
.route-ranking-bar::-webkit-scrollbar-thumb { background: #2d2f3e; border-radius: 2px; }
.ranking-label {
  font-size: 10px;
  font-weight: 700;
  color: #8b8fa8;
  text-transform: uppercase;
  letter-spacing: 1px;
  white-space: nowrap;
  flex-shrink: 0;
}
.route-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: #0f1117;
  border: 1px solid #2d2f3e;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.route-chip:hover { border-color: #4a9eff; transform: translateY(-1px); }
.route-chip.active { border-color: #4a9eff; background: rgba(74,158,255,0.1); }
.route-chip-icon { font-size: 14px; }
.route-chip-name { font-size: 11px; color: #e8e6e0; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
.route-chip-risk { font-size: 16px; font-weight: 700; }

/* ===== ツールチップ ===== */
.tooltip {
  position: absolute;
  background: rgba(26,29,39,0.96);
  border: 1px solid #2d2f3e;
  border-radius: 8px;
  padding: 12px;
  font-size: 12px;
  pointer-events: none;
  z-index: 200;
  max-width: 300px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  display: none;
}
.tooltip { background: #1e2535; }
.tooltip-title { font-size: 14px; font-weight: 700; color: #f0f6fc; margin-bottom: 4px; }
.tooltip-score { font-size: 20px; font-weight: 700; }
.tooltip-prob { margin-top: 8px; padding: 6px 8px; background: rgba(255,107,53,0.12); border-radius: 6px; font-size: 12px; color: #ffa94d; }
.tooltip-prob-val { font-weight: 700; font-size: 14px; }
.tooltip-dims { margin-top: 6px; font-size: 11px; color: #8b8fa8; }
.tooltip-dims-header { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #8b8fa8; margin-bottom: 4px; }
.tooltip-dim-row { display: flex; justify-content: space-between; padding: 2px 0; }
.tooltip-dim-bar { height: 3px; background: #0f1117; border-radius: 2px; margin-top: 2px; }
.tooltip-dim-fill { height: 100%; border-radius: 2px; }

/* ===== 凡例（地図左下） ===== */
.legend {
  position: absolute;
  bottom: 14px;
  left: 14px;
  background: rgba(26,29,39,0.92);
  border: 1px solid #2d2f3e;
  border-radius: 8px;
  padding: 10px 14px;
  z-index: 60;
  font-size: 11px;
}
.legend-title { font-weight: 600; color: #f0f6fc; margin-bottom: 6px; }
.legend-gradient {
  width: 160px; height: 10px; border-radius: 4px;
  background: linear-gradient(to right, #4a9eff, #ffd43b, #ff6b35, #ff0000);
  margin-bottom: 4px;
}
.legend-labels { display: flex; justify-content: space-between; color: #8b8fa8; font-size: 10px; }
.legend-items { margin-top: 8px; }
.legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; color: #e8e6e0; }
.legend-line { width: 20px; height: 3px; border-radius: 1px; flex-shrink: 0; }
.legend-hex {
  width: 12px; height: 12px; flex-shrink: 0;
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  background: #ffa94d;
}

/* ===== 脈動アニメーション（リスク70+チョークポイント） ===== */
@keyframes hexPulse {
  0% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 0.15; transform: scale(1.8); }
  100% { opacity: 0.4; transform: scale(1); }
}
.hex-pulse {
  animation: hexPulse 2s ease-in-out infinite;
  transform-origin: center;
}

/* ===== ルートアニメーション ===== */
@keyframes dash {
  to { stroke-dashoffset: -20; }
}
.route-animated {
  stroke-dasharray: 8, 12;
  animation: dash 1.5s linear infinite;
}

/* ===== ルートホバー時の薄暗さ ===== */
.route-dimmed { opacity: 0.12 !important; }
.route-highlight { opacity: 1 !important; }
.country-dimmed { opacity: 0.4 !important; }

/* ===== CP reroute info ===== */
.cp-reroute { font-size: 10px; color: #ffa94d; margin-top: 2px; }
.cp-closure-prob { font-size: 10px; color: #ff6b35; font-weight: 600; }

/* ===== 推奨アクションボックス ===== */
.recommendation-box {
  margin-top: 14px;
  padding: 12px;
  background: #0d2a1a;
  border: 1px solid #27ae60;
  border-radius: 8px;
  font-size: 12px;
  color: #51cf66;
  line-height: 1.6;
}
.recommendation-box.warn { background: #2a1a0d; border-color: #e67e22; color: #ffa94d; }
.recommendation-box.critical { background: #2a0d0d; border-color: #e74c3c; color: #ff6b6b; }
.recommendation-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

/* ===== ルート詳細: リスクサマリー ===== */
.route-risk-summary {
  background: #0f1117;
  border: 1px solid #2d2f3e;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 14px;
}
.route-risk-summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 0;
  font-size: 12px;
}
.route-risk-summary-label { color: #8b8fa8; }
.route-risk-summary-val { font-weight: 700; }
</style>
</head>

        <div class="legend-item">

          <span>Chokepoint</span>
        </div>

    </div>
  </div>

  </div>
</div>

</div>

const routeColorScale = d3.scaleLinear()
  .domain([0, 50, 80, 100])
  .range(["#4a9eff", "#ffd43b", "#ff6b35", "#ff0000"]);

function riskColor(score) {
  return routeColorScale(Math.max(0, Math.min(100, score)));
}

function riskColorSmooth(score) {
  const t = score / 100;
  if (t < 0.25) return d3.interpolateRgb("#4a9eff", "#5dbfff")(t * 4);
  if (t < 0.5) return d3.interpolateRgb("#5dbfff", "#ffd43b")((t - 0.25) * 4);
  if (t < 0.75) return d3.interpolateRgb("#ffd43b", "#ff6b35")((t - 0.5) * 4);
  return d3.interpolateRgb("#ff6b35", "#ff0000")((t - 0.75) * 4);
}

// 国塗り分け用（低リスクは暗い青、高リスクは赤）
function countryFillColor(score) {
  if (score === null || score === undefined) return "#1a1f29";
  const t = score / 100;
  if (t < 0.2) return d3.interpolateRgb("#1a2a3a", "#2a4a5a")(t * 5);
  if (t < 0.4) return d3.interpolateRgb("#2a4a5a", "#4a6a3a")((t - 0.2) * 5);
  if (t < 0.6) return d3.interpolateRgb("#4a6a3a", "#6a6a2a")((t - 0.4) * 5);
  if (t < 0.8) return d3.interpolateRgb("#6a6a2a", "#7a4a2a")((t - 0.6) * 5);
  return d3.interpolateRgb("#7a4a2a", "#8a2020")((t - 0.8) * 5);
}

function riskLevel(score) {
  if (score >= 80) return "CRITICAL";
  if (score >= 60) return "HIGH";
  if (score >= 40) return "MEDIUM";
  if (score >= 20) return "LOW";
  return "MINIMAL";
}

function getCountryScore(iso3, dim) {
  const d = RISK_DATA[iso3];
  if (!d) return null;
  return dim === "overall" ? d.overall : (d[dim] !== undefined ? d[dim] : null);
}

function getFlagEmoji(iso2) {
  if (!iso2 || iso2.length !== 2) return "";
  const cp = [...iso2.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65);
  return String.fromCodePoint(...cp);
}

function formatJPY(val) {
  if (val >= 10000000) return (val / 10000000).toFixed(0) + "00万円";
  if (val >= 10000) return (val / 10000).toFixed(0) + "万円";
  return val.toLocaleString() + "円";
}

// ===== リスク確率計算 =====
function calcDisruptionProbability(score, days) {
  const annual_prob = 0.05 + (score / 100) * 0.75;
  return Math.round((1 - Math.pow(1 - annual_prob, days / 365)) * 100);
}

function calcClosureProbability(risk, days) {
  const annual_prob = 0.02 + (risk / 100) * 0.60;
  return Math.round((1 - Math.pow(1 - annual_prob, days / 365)) * 100);
}

function getCriticalDimensions(r) {
  return Object.entries(r)
    .filter(([k, v]) => k !== 'name' && k !== 'overall' && k !== 'iso2' && k !== 'lat' && k !== 'lon' && typeof v === 'number' && v > 0)
    .sort(([, a], [, b]) => b - a)
    .slice(0, 4)
    .map(([k, v]) => ({ name: k, score: v }));
}

// 六角形パスジェネレータ
function hexPath(size) {
  const a = Math.PI / 3;
  let pts = [];
  for (let i = 0; i < 6; i++) {
    pts.push([size * Math.sin(a * i), -size * Math.cos(a * i)]);
  }
  return "M" + pts.map(p => p.join(",")).join("L") + "Z";
}

// ============================================================
// ルート描画 — 太さ=リスク、色=リスク
// ============================================================
function drawRoutes() {
  mapGroup.selectAll(".route-group").remove();
  const routeGroup = mapGroup.append("g").attr("class", "route-group");

  const lineGen = d3.line()
    .x(d => projection(d)[0])
    .y(d => projection(d)[1])
    .curve(d3.curveCatmullRom.alpha(0.5));

  const allRoutes = getAllVisibleRoutes();

  allRoutes.forEach(route => {
    const coords = route.points.map(p => [p[0], p[1]]); // [lon, lat]
    const strokeW = 1 + (route.risk / 100) * 5; // 1px〜6px
    const color = riskColor(route.risk);
    const isSea = route.type === "sea";

    // ルート背景（太いヒットエリア）
    routeGroup.append("path")
      .datum(coords)
      .attr("d", lineGen)
      .attr("fill", "none")
      .attr("stroke", "transparent")
      .attr("stroke-width", strokeW + 8)
      .attr("class", "route-hitarea")
      .attr("data-route-id", route.id)
      .attr("cursor", "pointer")
      .on("mouseover", function(event) { onRouteHover(route, event); })
      .on("mousemove", function(event) { onRouteMove(event); })
      .on("mouseout", function() { onRouteOut(); })
      .on("click", function() { selectRoute(route.id); });

    // ルートパス
    const p = routeGroup.append("path")
      .datum(coords)
      .attr("d", lineGen)
      .attr("fill", "none")
      .attr("stroke", color)
      .attr("stroke-width", strokeW)
      .attr("stroke-opacity", 0.75)
      .attr("stroke-linecap", "round")
      .attr("class", "route-path" + (isSea ? " route-animated" : ""))
      .attr("data-route-id", route.id);

    if (!isSea) {
      p.attr("stroke-dasharray", "6,4");
    }
  });
}

function getAllVisibleRoutes() {
  let routes = [];
  if (currentMode === "all" || currentMode === "sea") routes = routes.concat(SEA_ROUTES);
  if (currentMode === "all" || currentMode === "air") routes = routes.concat(AIR_ROUTES);
  return routes;
}

// ===== ルートホバー =====
function onRouteHover(route, event) {
  // 他のルートを暗くする
  mapGroup.selectAll(".route-path").classed("route-dimmed", true);
  mapGroup.selectAll(`.route-path[data-route-id="${route.id}"]`)
    .classed("route-dimmed", false)
    .classed("route-highlight", true)
    .attr("stroke-opacity", 1);

  // チョークポイント強調
  if (route.chokepoints && route.chokepoints.length > 0) {
    const cpNames = route.chokepoints.map(c => c.name);
    mapGroup.selectAll(".cp-hex-group").each(function() {
      const name = d3.select(this).attr("data-cp-name");
      if (cpNames.includes(name)) {
        d3.select(this).select(".cp-hex-main").attr("stroke", "#fff").attr("stroke-width", 2);
      }
    });
  }

  // ツールチップ
  let cpHtml = "";
  if (route.chokepoints && route.chokepoints.length > 0) {
    cpHtml = "<div style='margin-top:6px;font-size:11px;color:#8b8fa8;'>Chokepoints:</div>";
    cpHtml += route.chokepoints.map(c =>
      `<div style="display:flex;justify-content:space-between;font-size:11px;padding:1px 0;">
        <span style="color:#e8e6e0">${c.name}</span>
        <span style="color:${riskColor(c.risk)};font-weight:700">${c.risk}</span>
      </div>`
    ).join("");
  }

  tooltip.innerHTML = `
    <div class="tooltip-title">${route.type === "sea" ? "🚢" : "✈"} ${route.name}</div>
    <div class="tooltip-score" style="color:${riskColor(route.risk)}">${route.risk} <span style="font-size:12px;color:#8b8fa8">${riskLevel(route.risk)}</span></div>
    ${cpHtml}`;
  tooltip.style.display = "block";
  onRouteMove(event);
}

function onRouteMove(event) {
  const rect = mapContainer.getBoundingClientRect();
  let x = event.clientX - rect.left + 15;
  let y = event.clientY - rect.top + 15;
  if (x + 300 > rect.width) x = event.clientX - rect.left - 310;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
}

function onRouteOut() {
  mapGroup.selectAll(".route-path")
    .classed("route-dimmed", false)
    .classed("route-highlight", false)
    .attr("stroke-opacity", 0.75);
  mapGroup.selectAll(".cp-hex-main").attr("stroke", "#0f1117").attr("stroke-width", 1);
  tooltip.style.display = "none";
}

// ============================================================
// チョークポイント描画 — 六角形シンボル
// ============================================================
function drawChokepoints() {
  mapGroup.selectAll(".chokepoint-layer").remove();
  const cpLayer = mapGroup.append("g").attr("class", "chokepoint-layer");

  CHOKEPOINTS.forEach(cp => {
    const [x, y] = projection([cp.lon, cp.lat]);
    if (!x || !y) return;

    const size = 8 + (cp.risk / 100) * 20;
    const g = cpLayer.append("g")
      .attr("class", "cp-hex-group")
      .attr("data-cp-name", cp.name)
      .attr("transform", `translate(${x},${y})`);

    // 脈動エフェクト（リスク70以上）
    if (cp.risk >= 70) {
      g.append("path")
        .attr("d", hexPath(size * 1.5))
        .attr("fill", cp.color)
        .attr("opacity", 0.3)
        .attr("class", "hex-pulse");
    }

    // 六角形本体
    g.append("path")
      .attr("d", hexPath(size))
      .attr("fill", cp.color)
      .attr("fill-opacity", 0.85)
      .attr("stroke", "#0f1117")
      .attr("stroke-width", 1)
      .attr("class", "cp-hex-main");

    // リスク数値
    g.append("text")
      .attr("text-anchor", "middle")
      .attr("dy", "0.35em")
      .attr("fill", "#fff")
      .attr("font-size", Math.max(10, size * 0.6) + "px")
      .attr("font-weight", "700")
      .text(cp.risk);

    // インタラクション用透明カバー
    g.append("circle")
      .attr("r", size + 5)
      .attr("fill", "transparent")
      .attr("cursor", "pointer")
      .on("mouseover", function(event) {
        tooltip.innerHTML = `<div class="tooltip-title">${cp.name}</div>
          <div class="tooltip-score" style="color:${cp.color}">${cp.risk} <span style="font-size:12px;color:#8b8fa8">${riskLevel(cp.risk)}</span></div>
          <div style="font-size:11px;color:#8b8fa8;margin-top:4px">${cp.status}</div>`;
        tooltip.style.display = "block";
        const rect = mapContainer.getBoundingClientRect();
        tooltip.style.left = (event.clientX - rect.left + 15) + "px";
        tooltip.style.top = (event.clientY - rect.top + 15) + "px";
      })
      .on("mousemove", function(event) {
        const rect = mapContainer.getBoundingClientRect();
        tooltip.style.left = (event.clientX - rect.left + 15) + "px";
        tooltip.style.top = (event.clientY - rect.top + 15) + "px";
      })
      .on("mouseout", function() { tooltip.style.display = "none"; })
      .on("click", function() {
        svg.transition().duration(750).call(
          zoom.transform,
          d3.zoomIdentity.translate(width / 2, height / 2).scale(4).translate(-x, -y)
        );
      });
  });
}

// ============================================================
// 右パネル — チョークポイント状況
// ============================================================
function buildChokepointPanel() {
  const el = document.getElementById("cp-list");
  const sorted = [...CHOKEPOINTS].sort((a, b) => b.risk - a.risk);
  el.innerHTML = sorted.map(cp => {
    const closureProb = calcClosureProbability(cp.risk, 30);
    const reroute = REROUTE_COSTS[cp.id] || {};
    return `
    <div class="cp-item" onclick="zoomToChokepoint(${cp.lat},${cp.lon})">
      <div class="cp-dot" style="background:${cp.color}"></div>
      <div class="cp-info">
        <div class="cp-name">${cp.name}</div>
        <div class="cp-status-text">${cp.status}</div>
        <div style="font-size:10px;color:#8b8fa8;margin-top:2px">
          30日通航制限: <span style="color:${closureProb > 15 ? '#ff4d4d' : '#ffd43b'};font-weight:600">${closureProb}%</span>
          ${reroute.days ? ` · 迂回+${reroute.days}日 / +${(reroute.cost_jpy/1000000).toFixed(0)}百万円` : ''}
        </div>
      </div>
      <div class="cp-risk-val" style="color:${cp.color}">${cp.risk}</div>
    </div>`;
  }).join("");
}

// ============================================================
// 右パネル — ルート詳細
// ============================================================
function showRouteDetail(route) {
  const emptyEl = document.getElementById("route-detail-empty");
  const contentEl = document.getElementById("route-detail-content");
  emptyEl.style.display = "none";
  contentEl.style.display = "block";

  let cpBars = "";
  if (route.chokepoints && route.chokepoints.length > 0) {
    cpBars = `<div class="cp-breakdown">
      <div class="cp-breakdown-title">Chokepoint Risk</div>
      ${route.chokepoints.map(c => `
        <div class="cp-bar-row">
          <div class="cp-bar-name">${c.name}</div>
          <div class="cp-bar-track">
            <div class="cp-bar-fill" style="width:${c.risk}%;background:${riskColor(c.risk)}"></div>
          </div>
          <div class="cp-bar-val" style="color:${riskColor(c.risk)}">${c.risk}</div>
        </div>
      `).join("")}
    </div>`;
  } else {
    cpBars = `<div style="font-size:12px;color:#8b8fa8;margin-bottom:14px;">-- No chokepoints on this route --</div>`;
  }

  let altHtml = "";
  if (route.alternative) {
    const a = route.alternative;
    altHtml = `<div class="alt-route-box">
      <div class="alt-route-label">Alternative Route</div>
      <div class="alt-route-name">${a.route}</div>
      <div class="alt-route-stats">
        <div class="alt-stat">+<strong>${a.extra_days}</strong> days</div>
        <div class="alt-stat">+<strong>${formatJPY(a.extra_cost_jpy)}</strong></div>
      </div>
    </div>`;
  }

  // 期待追加コスト計算
  const expectedCost = (route.chokepoints || []).reduce((sum, cp) => {
    const prob = calcClosureProbability(cp.risk, 90) / 100;
    const cost = (REROUTE_COSTS[cp.id || ''] || {}).cost_jpy || 0;
    return sum + prob * cost;
  }, 0);
  const disruptProb90 = Math.max(...(route.chokepoints || []).map(c => calcClosureProbability(c.risk, 90)), 0);

  contentEl.innerHTML = `
    <div class="route-detail-header">
      <div class="route-detail-name">${route.type === "sea" ? "🚢" : "✈"} ${route.name}</div>
      <div class="route-detail-risk-badge" style="color:${riskColor(route.risk)}">${route.risk}</div>
    </div>
    <div style="background:#1a2535;border:1px solid #2d3a4a;border-radius:8px;padding:10px;margin-bottom:12px">
      <div style="font-size:11px;color:#ffd43b;margin-bottom:8px">📊 このルートのリスク実態</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>
          <div style="font-size:10px;color:#8b8fa8">90日以内の障害確率</div>
          <div style="font-size:18px;font-weight:700;color:${disruptProb90 > 30 ? '#ff4d4d' : '#ffd43b'}">${disruptProb90}%</div>
        </div>
        <div>
          <div style="font-size:10px;color:#8b8fa8">期待追加コスト/航</div>
          <div style="font-size:14px;font-weight:700;color:#ff9f43">${expectedCost > 0 ? '+' + (expectedCost/1000000).toFixed(0) + '百万円' : '—'}</div>
        </div>
      </div>
    </div>
    ${cpBars}
    ${altHtml}
    <div style="margin-top:12px;background:#0d2a1a;border:1px solid #27ae60;border-radius:8px;padding:10px">
      <div style="font-size:11px;color:#51cf66;font-weight:600;margin-bottom:4px">💡 推奨アクション</div>
      <div style="font-size:11px;color:#e8e6e0">${getRouteRecommendation(route, expectedCost)}</div>
    </div>
  `;
}

function clearRouteDetail() {
  document.getElementById("route-detail-empty").style.display = "flex";
  document.getElementById("route-detail-content").style.display = "none";
}

// ============================================================
// 下部ルートランキングバー
// ============================================================
function buildRouteRankingBar() {
  const bar = document.getElementById("route-ranking-bar");
  // ラベル以降をクリア
  while (bar.children.length > 1) bar.removeChild(bar.lastChild);

  const allRoutes = [...SEA_ROUTES, ...AIR_ROUTES].sort((a, b) => b.risk - a.risk);

  allRoutes.forEach(route => {
    const chip = document.createElement("div");
    chip.className = "route-chip";
    chip.setAttribute("data-route-id", route.id);
    chip.innerHTML = `
      <span class="route-chip-icon">${route.type === "sea" ? "🚢" : "✈"}</span>
      <span class="route-chip-name">${route.name}</span>
      <span class="route-chip-risk" style="color:${riskColor(route.risk)}">${route.risk}</span>
    `;
    chip.onclick = () => selectRoute(route.id);
    bar.appendChild(chip);
  });
}

// ===== ルート選択（クリック） =====
function selectRoute(routeId) {
  selectedRouteId = (selectedRouteId === routeId) ? null : routeId;

  // チップのactiveクラス
  document.querySelectorAll(".route-chip").forEach(c => {
    c.classList.toggle("active", c.getAttribute("data-route-id") === selectedRouteId);
  });

  if (selectedRouteId) {
    const route = [...SEA_ROUTES, ...AIR_ROUTES].find(r => r.id === selectedRouteId);
    if (route) {
      showRouteDetail(route);
      // 地図上でハイライト
      mapGroup.selectAll(".route-path").attr("stroke-opacity", 0.15);
      mapGroup.selectAll(`.route-path[data-route-id="${selectedRouteId}"]`).attr("stroke-opacity", 1);

      // 通過チョークポイント強調
      if (route.chokepoints && route.chokepoints.length > 0) {
        const cpNames = route.chokepoints.map(c => c.name);
        mapGroup.selectAll(".cp-hex-group").each(function() {
          const name = d3.select(this).attr("data-cp-name");
          if (cpNames.includes(name)) {
            d3.select(this).select(".cp-hex-main").attr("stroke", "#fff").attr("stroke-width", 2.5);
          } else {
            d3.select(this).select(".cp-hex-main").attr("stroke", "#0f1117").attr("stroke-width", 1);
          }
        });
      }
    }
  } else {
    clearRouteDetail();
    mapGroup.selectAll(".route-path").attr("stroke-opacity", 0.75);
    mapGroup.selectAll(".cp-hex-main").attr("stroke", "#0f1117").attr("stroke-width", 1);
  }
}

// ============================================================
// 地図更新・コントロール
// ============================================================
document.getElementById("dimension-select").addEventListener("change", function() {
  currentDimension = this.value;
  updateMap();
});

function updateMap() {
  if (!countryPaths || !window._numToIso3) return;
  countryPaths.transition().duration(500)
    .attr("fill", d => {
      const iso3 = window._numToIso3[d.id];
      const score = iso3 ? getCountryScore(iso3, currentDimension) : null;
      return countryFillColor(score);
    });
}

function toggleMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  selectedRouteId = null;
  clearRouteDetail();
  document.querySelectorAll(".route-chip").forEach(c => c.classList.remove("active"));
  drawRoutes();
  drawChokepoints();
}

function zoomToChokepoint(lat, lon) {
  const [x, y] = projection([lon, lat]);
  svg.transition().duration(750).call(
    zoom.transform,
    d3.zoomIdentity.translate(width / 2, height / 2).scale(4).translate(-x, -y)
  );
}

// ============================================================
// APIデータ取得（フォールバック付き）
// ============================================================
async function loadRealData() {
  try {
    const resp = await fetch('/api/v1/dashboard/global-risk');
    if (!resp.ok) throw new Error('API error ' + resp.status);
    const json = await resp.json();

    // APIデータでRISK_DATAを上書き（フォールバックをベースに）
    RISK_DATA = {...RISK_DATA_FALLBACK};
    for (const c of json.countries || []) {
      const iso3 = c.iso3;
      if (!iso3) continue;
      // 既存エントリがあればマージ、なければ新規作成
      if (RISK_DATA[iso3]) {
        RISK_DATA[iso3].overall = Math.round(c.overall_score || RISK_DATA[iso3].overall || 0);
        const dims = c.dimensions || {};
        for (const [k, v] of Object.entries(dims)) {
          RISK_DATA[iso3][k] = Math.round(v || 0);
        }
      } else {
        const entry = {
          name: c.name || iso3,
          iso2: c.iso2 || '',
          lat: 0, lon: 0,
          overall: Math.round(c.overall_score || 0),
        };
        const dims = c.dimensions || {};
        for (const [k, v] of Object.entries(dims)) {
          entry[k] = Math.round(v || 0);
        }
        RISK_DATA[iso3] = entry;
      }
    }

    console.log('API: ' + Object.keys(RISK_DATA).length + ' countries loaded');
    document.getElementById("update-time").textContent =
      'Updated: ' + new Date().toISOString().slice(0, 16).replace("T", " ") + ' UTC';
    const dsEl = document.getElementById("dataSource");
    dsEl.textContent = 'LIVE';
    dsEl.style.background = 'rgba(81,207,102,0.2)';
    dsEl.style.color = '#51cf66';
  } catch(e) {
    console.warn('API fallback:', e.message);
    RISK_DATA = {...RISK_DATA_FALLBACK};
    document.getElementById("update-time").textContent =
      'Updated: 2026-04-02 (Static Data)';
    const dsEl = document.getElementById("dataSource");
    dsEl.textContent = 'STATIC';
    dsEl.style.background = 'rgba(255,169,77,0.2)';
    dsEl.style.color = '#ffa94d';
  }

  // 地図を再描画
  updateMap();
}

// チョークポイントもAPI取得
async function loadChokepoints() {
  try {
    const resp = await fetch('/api/v1/dashboard/chokepoints');
    if (!resp.ok) throw new Error('CP API error ' + resp.status);
    const json = await resp.json();
    CHOKEPOINTS.length = 0;
    for (const cp of json.chokepoints || []) {
      CHOKEPOINTS.push(cp);
    }
  } catch(e) {
    console.warn('Chokepoint API fallback:', e.message);
    CHOKEPOINTS.length = 0;
    CHOKEPOINTS.push(...CHOKEPOINTS_FALLBACK);
  }
  drawChokepoints();
  buildChokepointPanel();
}

// 初回ロード + 30分間隔の自動更新
loadRealData().then(() => loadChokepoints());
setInterval(() => { loadRealData().then(() => loadChokepoints()); }, 30 * 60 * 1000);

// ウィンドウリサイズ対応
window.addEventListener("resize", () => {
  width = mapContainer.clientWidth;
  height = mapContainer.clientHeight;
  projection.scale(width / 5.5).translate([width / 2, height / 2]);
  if (countryPaths) {
    countryPaths.attr("d", path);
    mapGroup.selectAll("path").attr("d", function(d) {
      if (d && d.type) return path(d);
      return d3.select(this).attr("d");
    });
  }
  drawRoutes();
  drawChokepoints();
});
</script>
