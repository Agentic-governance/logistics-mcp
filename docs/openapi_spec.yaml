# ===========================================================================
# Components
# ===========================================================================
components:
  schemas:
    ScreenRequest:
      type: object
      required: [company_name]
      properties:
        company_name:
          type: string
          description: Company name (Japanese/English)
        country:
          type: string
          description: Country name (optional, improves accuracy)

    BulkScreenRequest:
      type: object
      required: [companies]
      properties:
        companies:
          type: array
          items:
            $ref: "#/components/schemas/ScreenRequest"

    ScreenResult:
      type: object
      properties:
        company_name:
          type: string
        matched:
          type: boolean
        match_score:
          type: number
        source:
          type: string
        matched_entity:
          type: string
        evidence:
          type: array
          items:
            type: string
        screened_at:
          type: string
          format: date-time

    BulkScreenResponse:
      type: object
      properties:
        total_screened:
          type: integer
        matched_count:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/ScreenResult"

    MonitorRequest:
      type: object
      required: [supplier_id, company_name, location]
      properties:
        supplier_id:
          type: string
        company_name:
          type: string
        location:
          type: string

    RouteRiskRequest:
      type: object
      required: [origin, destination]
      properties:
        origin:
          type: string
        destination:
          type: string

    DDReportRequest:
      type: object
      required: [entity_name, country]
      properties:
        entity_name:
          type: string
        country:
          type: string

    BulkAssessRequest:
      type: object
      required: [csv_data]
      properties:
        csv_data:
          type: string
          description: CSV-formatted supplier data
        depth:
          type: string
          default: quick
          enum: [quick, standard, deep]

    PortfolioRequest:
      type: object
      required: [entities]
      properties:
        entities:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              country:
                type: string
              tier:
                type: integer
              share:
                type: number
        dimensions:
          type: array
          items:
            type: string
          default: []
        include_clustering:
          type: boolean
          default: false

    RankRequest:
      type: object
      required: [entities]
      properties:
        entities:
          type: array
          items:
            type: object
        sort_by:
          type: string
          default: overall
        ascending:
          type: boolean
          default: true

    ClusterRequest:
      type: object
      required: [entities]
      properties:
        entities:
          type: array
          items:
            type: object
        n_clusters:
          type: integer
