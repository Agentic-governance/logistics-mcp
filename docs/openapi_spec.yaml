openapi: "3.0.3"
info:
  title: Supply Chain Risk Intelligence API
  description: |
    24-dimensional passive supply-chain risk detection platform (SCRI).
    Aggregates 30+ open data sources to provide real-time risk scoring,
    BOM analysis, cost-impact estimation, screening, analytics, and
    forecasting capabilities.
  version: "0.9.0"
  contact:
    name: SCRI Platform Team
  license:
    name: Proprietary

servers:
  - url: http://localhost:8000
    description: Local development server

tags:
  - name: Health & Status
    description: Health checks, metrics, and system statistics
  - name: Sanctions Screening
    description: Sanctions list screening (OFAC/EU/UN/OpenSanctions/METI/BIS)
  - name: Risk Scoring
    description: 24-dimensional risk score calculation
  - name: Disasters
    description: Natural disaster data (GDACS, USGS)
  - name: Maritime
    description: Maritime disruptions, port activity, congestion
  - name: Conflict
    description: Armed conflict and political violence (ACLED)
  - name: Economic
    description: Economic indicators and currency risk
  - name: Trade
    description: Trade dependency risk (UN Comtrade)
  - name: Energy
    description: Commodity prices (FRED/EIA)
  - name: Health
    description: Disease and humanitarian risk
  - name: Food Security
    description: Food security risk (WFP)
  - name: Weather
    description: Weather, typhoon, and space weather risk
  - name: Compliance
    description: Compliance, political, and labor risk
  - name: Infrastructure
    description: Internet infrastructure risk
  - name: Aviation
    description: Aviation traffic activity (OpenSky)
  - name: Japan
    description: Japan-specific economic indicators
  - name: Dashboard
    description: Global risk dashboard
  - name: Alerts & Monitoring
    description: Risk alerts and supplier monitoring
  - name: Supply Chain Graph
    description: Tier-N supply chain graph
  - name: Route Risk
    description: Transport route risk analysis and chokepoints
  - name: Concentration
    description: Supplier concentration risk
  - name: Simulation
    description: Disruption simulation scenarios
  - name: Due Diligence
    description: KYS due diligence reports
  - name: Commodity Exposure
    description: Commodity exposure analysis by sector
  - name: Bulk Assessment
    description: Bulk supplier assessment
  - name: Climate
    description: Climate risk (ND-GAIN/GloFAS/WRI)
  - name: Cyber
    description: Cyber risk (OONI/CISA KEV/ITU ICT)
  - name: Data Quality
    description: Data quality monitoring
  - name: Analytics
    description: Portfolio, correlation, benchmark, and sensitivity analytics
  - name: Forecasting
    description: Time-series forecasting and backtest
  - name: Screening
    description: Supplier reputation screening
  - name: Cost Impact
    description: Disruption cost estimation and scenario comparison
  - name: BOM Analysis
    description: Bill of Materials risk analysis and Tier-2+ inference
  - name: Batch & Webhooks
    description: Batch operations and webhook management

paths:
  # =========================================================================
  # Health & Status
  # =========================================================================
  /health:
    get:
      tags: [Health & Status]
      summary: Health check
      description: |
        Returns system health including sanctions source status, active alert count,
        data freshness, forecast model status, correlation checks, coverage stats,
        and uptime.
      operationId: health
      parameters: []
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /metrics:
    get:
      tags: [Health & Status]
      summary: Prometheus metrics
      description: Prometheus-compatible metrics endpoint (text/plain exposition format).
      operationId: prometheusMetrics
      responses:
        "200":
          description: Prometheus text format metrics
          content:
            text/plain:
              schema:
                type: string

  /api/v1/stats:
    get:
      tags: [Health & Status]
      summary: DB statistics and data source status
      description: Returns counts of sanctions entities, screenings, alerts, monitored suppliers, and data pipeline details.
      operationId: getStats
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

  # =========================================================================
  # Sanctions Screening
  # =========================================================================
  /api/v1/screen:
    post:
      tags: [Sanctions Screening]
      summary: Screen single entity
      description: Screen a single company against consolidated sanctions lists (OFAC/EU/UN/OpenSanctions/METI/BIS).
      operationId: screenSanctions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScreenRequest"
      responses:
        "200":
          description: Screening result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreenResult"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/screen/bulk:
    post:
      tags: [Sanctions Screening]
      summary: Bulk screen entities
      description: Screen multiple companies against sanctions lists in a single request.
      operationId: bulkScreen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkScreenRequest"
      responses:
        "200":
          description: Bulk screening results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkScreenResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  # =========================================================================
  # Risk Scoring
  # =========================================================================
  /api/v1/risk/{supplier_id}:
    get:
      tags: [Risk Scoring]
      summary: Get 24-dimensional risk score
      description: Calculate comprehensive 24-dimensional risk score for a supplier.
      operationId: getRiskScore
      parameters:
        - name: supplier_id
          in: path
          required: true
          schema:
            type: string
          description: Supplier identifier
        - name: company_name
          in: query
          required: true
          schema:
            type: string
          description: Company name
        - name: country
          in: query
          schema:
            type: string
          description: Country name or code
        - name: location
          in: query
          schema:
            type: string
          description: Location (city or country)
      responses:
        "200":
          description: 24-dimensional risk score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskScoreResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  # =========================================================================
  # Disasters
  # =========================================================================
  /api/v1/disasters/global:
    get:
      tags: [Disasters]
      summary: Global disaster alerts (GDACS)
      description: Fetch active global disaster alerts from GDACS.
      operationId: getGlobalDisasters
      responses:
        "200":
          description: Disaster events
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/DisasterEvent"
                  source:
                    type: string
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/disasters/earthquakes:
    get:
      tags: [Disasters]
      summary: Earthquake data (USGS)
      description: Fetch recent earthquake data from USGS.
      operationId: getEarthquakes
      parameters:
        - name: min_magnitude
          in: query
          schema:
            type: number
            default: 4.5
          description: Minimum earthquake magnitude
        - name: days
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 30
            default: 7
          description: Number of days to look back
      responses:
        "200":
          description: Earthquake data
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  earthquakes:
                    type: array
                    items:
                      type: object
                  source:
                    type: string
        "502":
          $ref: "#/components/responses/UpstreamError"

  # =========================================================================
  # Maritime
  # =========================================================================
  /api/v1/maritime/disruptions:
    get:
      tags: [Maritime]
      summary: Port disruptions (IMF PortWatch)
      description: Fetch active maritime/port disruption events.
      operationId: getMaritimeDisruptions
      responses:
        "200":
          description: Disruption events
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  disruptions:
                    type: array
                    items:
                      type: object
                  source:
                    type: string
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/maritime/port-activity:
    get:
      tags: [Maritime]
      summary: Port activity data
      description: Fetch port activity data from IMF PortWatch.
      operationId: getPortActivity
      parameters:
        - name: port_name
          in: query
          schema:
            type: string
          description: Port name filter
        - name: country
          in: query
          schema:
            type: string
          description: Country filter
        - name: days
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 30
          description: Days to look back
      responses:
        "200":
          description: Port activity
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  activity:
                    type: array
                    items:
                      type: object
                  source:
                    type: string
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/maritime/congestion/{region}:
    get:
      tags: [Maritime]
      summary: Shipping lane congestion (AIS)
      description: Get shipping lane congestion data for a region.
      operationId: getShippingCongestion
      parameters:
        - name: region
          in: path
          required: true
          schema:
            type: string
          description: Region identifier
      responses:
        "200":
          description: Congestion data
          content:
            application/json:
              schema:
                type: object
                properties:
                  region:
                    type: string
                  source:
                    type: string
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/maritime/port-congestion/{location}:
    get:
      tags: [Maritime]
      summary: Port congestion risk
      description: Get port congestion and chokepoint risk for a location.
      operationId: getPortCongestion
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
          description: Location name
      responses:
        "200":
          description: Port congestion risk
          content:
            application/json:
              schema:
                type: object
        "502":
          $ref: "#/components/responses/UpstreamError"

  # =========================================================================
  # Conflict
  # =========================================================================
  /api/v1/conflict/{location}:
    get:
      tags: [Conflict]
      summary: Conflict risk (ACLED)
      description: Get armed conflict and political violence risk for a location.
      operationId: getConflictRisk
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
          description: Location (country or city)
      responses:
        "200":
          description: Conflict risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  # =========================================================================
  # Economic
  # =========================================================================
  /api/v1/economic/{location}:
    get:
      tags: [Economic]
      summary: Economic risk (World Bank)
      description: Get economic risk indicators for a location.
      operationId: getEconomicRisk
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Economic risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/economic/profile/{location}:
    get:
      tags: [Economic]
      summary: Economic profile
      description: Get detailed economic profile for a location.
      operationId: getEconomicProfile
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Economic profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/currency/{location}:
    get:
      tags: [Economic]
      summary: Currency volatility risk
      description: Get currency volatility risk for a location.
      operationId: getCurrencyRisk
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Currency risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/trade/{location}:
    get:
      tags: [Trade]
      summary: Trade dependency risk (UN Comtrade)
      description: Get trade dependency risk for a location.
      operationId: getTradeRisk
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trade risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  # =========================================================================
  # Energy
  # =========================================================================
  /api/v1/energy/commodities:
    get:
      tags: [Energy]
      summary: Commodity prices (FRED/EIA)
      description: Get current commodity price data.
      operationId: getCommodityPrices
      responses:
        "200":
          description: Commodity price data
          content:
            application/json:
              schema:
                type: object
        "502":
          $ref: "#/components/responses/UpstreamError"

  # =========================================================================
  # Health
  # =========================================================================
  /api/v1/health/{location}:
    get:
      tags: [Health]
      summary: Disease risk (Disease.sh)
      description: Get infectious disease risk for a location.
      operationId: getHealthRisk
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Health risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/humanitarian/{location}:
    get:
      tags: [Health]
      summary: Humanitarian crisis risk (ReliefWeb)
      description: Get humanitarian crisis data for a location.
      operationId: getHumanitarianRisk
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Humanitarian risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/food-security/{location}:
    get:
      tags: [Food Security]
      summary: Food security risk (WFP)
      description: Get food security risk from WFP HungerMap.
      operationId: getFoodSecurity
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Food security data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  # =========================================================================
  # Weather
  # =========================================================================
  /api/v1/weather/{location}:
    get:
      tags: [Weather]
      summary: Weather risk (Open-Meteo)
      description: Get extreme weather event risk for a location.
      operationId: getWeatherRisk
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Weather risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/weather/typhoon/{location}:
    get:
      tags: [Weather]
      summary: Typhoon risk (NOAA)
      description: Get typhoon/cyclone and space weather risk.
      operationId: getTyphoonRisk
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Typhoon risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/weather/space:
    get:
      tags: [Weather]
      summary: Space weather (NOAA SWPC)
      description: Get current space weather conditions (Kp index, solar wind, alerts).
      operationId: getSpaceWeather
      responses:
        "200":
          description: Space weather data
          content:
            application/json:
              schema:
                type: object
        "502":
          $ref: "#/components/responses/UpstreamError"

  # =========================================================================
  # Compliance
  # =========================================================================
  /api/v1/compliance/{location}:
    get:
      tags: [Compliance]
      summary: Compliance risk (FATF/INFORM/TI-CPI)
      description: Get compliance risk for a location.
      operationId: getComplianceRisk
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Compliance risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/compliance/political/{location}:
    get:
      tags: [Compliance]
      summary: Political risk (Freedom House/FSI)
      description: Get political risk for a location.
      operationId: getPoliticalRisk
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Political risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/compliance/labor/{location}:
    get:
      tags: [Compliance]
      summary: Labor risk (DoL ILAB/GSI)
      description: Get forced labor and child labor risk for a location.
      operationId: getLaborRisk
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Labor risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  # =========================================================================
  # Infrastructure
  # =========================================================================
  /api/v1/infrastructure/internet/{location}:
    get:
      tags: [Infrastructure]
      summary: Internet infrastructure risk
      description: Get internet infrastructure risk (Cloudflare Radar/IODA).
      operationId: getInternetRisk
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Internet risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  # =========================================================================
  # Aviation
  # =========================================================================
  /api/v1/aviation/{location}:
    get:
      tags: [Aviation]
      summary: Aviation activity (OpenSky)
      description: Get aviation traffic activity for a location.
      operationId: getAviationActivity
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Aviation data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationRiskResponse"
        "502":
          $ref: "#/components/responses/UpstreamError"

  # =========================================================================
  # Japan
  # =========================================================================
  /api/v1/japan/economy:
    get:
      tags: [Japan]
      summary: Japan economic indicators (BOJ/e-Stat)
      description: Get Japan-specific economic indicators.
      operationId: getJapanEconomy
      responses:
        "200":
          description: Japan economy data
          content:
            application/json:
              schema:
                type: object
        "502":
          $ref: "#/components/responses/UpstreamError"

  # =========================================================================
  # Dashboard
  # =========================================================================
  /api/v1/dashboard/global:
    get:
      tags: [Dashboard]
      summary: Global risk dashboard
      description: |
        Aggregated global risk dashboard pulling from all data sources:
        GDACS disasters, USGS earthquakes, NOAA storms/space weather,
        IMF PortWatch, COVID, Japan economy, and DB statistics.
      operationId: globalRiskDashboard
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Serve interactive HTML dashboard
      description: Returns the interactive HTML dashboard page.
      operationId: serveDashboard
      responses:
        "200":
          description: HTML dashboard page
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Dashboard not generated

  # =========================================================================
  # Alerts & Monitoring
  # =========================================================================
  /api/v1/alerts:
    get:
      tags: [Alerts & Monitoring]
      summary: Get risk alerts
      description: Retrieve recent risk alerts filtered by time window and minimum score.
      operationId: getAlerts
      parameters:
        - name: since_hours
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 720
            default: 24
          description: Hours to look back
        - name: min_score
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100
            default: 50
          description: Minimum risk score filter
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/monitor:
    post:
      tags: [Alerts & Monitoring]
      summary: Register supplier for monitoring
      description: Register a supplier for continuous 24-dimensional risk monitoring at 15-minute intervals.
      operationId: registerMonitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonitorRequest"
      responses:
        "200":
          description: Registration confirmation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  supplier_id:
                    type: string
                  monitoring:
                    type: object

  /api/v1/monitors:
    get:
      tags: [Alerts & Monitoring]
      summary: List monitored suppliers
      description: List all actively monitored suppliers.
      operationId: listMonitors
      responses:
        "200":
          description: Monitored suppliers
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  suppliers:
                    type: array
                    items:
                      type: object
                      properties:
                        supplier_id:
                          type: string
                        company_name:
                          type: string
                        location:
                          type: string

  # =========================================================================
  # Supply Chain Graph
  # =========================================================================
  /api/v1/graph/{company_name}:
    get:
      tags: [Supply Chain Graph]
      summary: Get Tier-N supply chain graph
      description: Build and return a supply chain graph for a company.
      operationId: getGraph
      parameters:
        - name: company_name
          in: path
          required: true
          schema:
            type: string
        - name: country_code
          in: query
          schema:
            type: string
            default: jp
        - name: depth
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 3
            default: 2
      responses:
        "200":
          description: Supply chain graph data
          content:
            application/json:
              schema:
                type: object

  # =========================================================================
  # Route Risk
  # =========================================================================
  /api/v1/route-risk:
    post:
      tags: [Route Risk]
      summary: Analyze transport route risk
      description: Analyze shipping route risk including chokepoint passage and alternative routes.
      operationId: analyzeRouteRisk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteRiskRequest"
      responses:
        "200":
          description: Route risk analysis
          content:
            application/json:
              schema:
                type: object
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/v1/chokepoints:
    get:
      tags: [Route Risk]
      summary: List 7 major chokepoints
      description: List all major maritime chokepoints with current risk levels.
      operationId: listChokepoints
      responses:
        "200":
          description: Chokepoint list
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  chokepoints:
                    type: array
                    items:
                      type: object

  /api/v1/chokepoint/{chokepoint_id}:
    get:
      tags: [Route Risk]
      summary: Get individual chokepoint risk
      description: Get risk details for a specific chokepoint.
      operationId: getChokepointRisk
