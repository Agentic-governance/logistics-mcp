<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCRI Terminal - 国別詳細分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0f;
  color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.terminal-header {
  background: #0d1117;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  flex-shrink: 0;
}
.terminal-header .logo {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-weight: 700;
  color: #3b82f6;
  letter-spacing: 0.05em;
}
.terminal-header .title {
  color: #94a3b8;
  font-weight: 400;
}
.terminal-header .back-link {
  color: #3b82f6;
  text-decoration: none;
  font-size: 11px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}
.terminal-header .back-link:hover { text-decoration: underline; }

.main-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr auto;
  gap: 1px;
  background: rgba(255,255,255,0.03);
  overflow: hidden;
}

.panel {
  background: #0a0a0f;
  padding: 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.panel::-webkit-scrollbar-track { background: transparent; }

.panel-title {
  font-size: 10px;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}

/* 予測チャートパネル */
.forecast-panel {
  grid-column: 1;
  grid-row: 1;
}
.forecast-stats {
  display: flex;
  gap: 20px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.forecast-stat {
  display: flex;
  flex-direction: column;
}
.forecast-stat-label {
  font-size: 9px;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.forecast-stat-value {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.forecast-stat-value.base-val { color: #3b82f6; }
.forecast-stat-value.pessimistic-val { color: #ef4444; }
.forecast-stat-value.optimistic-val { color: #22c55e; }
.forecast-stat-value.band-val { color: #eab308; }

.chart-wrap {
  flex: 1;
  position: relative;
  min-height: 0;
}
.chart-wrap canvas {
  width: 100% !important;
  height: 100% !important;
}

/* ドライバー影響度パネル */
.driver-panel {
  grid-column: 2;
  grid-row: 1;
}
.driver-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.driver-bar-name {
  font-size: 11px;
  color: #94a3b8;
  width: 140px;
  flex-shrink: 0;
  text-align: right;
}
.driver-bar-track {
  flex: 1;
  height: 16px;
  background: #1e293b;
  border-radius: 3px;
  position: relative;
  overflow: hidden;
}
.driver-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.driver-bar-pct {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 10px;
  color: #e2e8f0;
  width: 36px;
  text-align: right;
  flex-shrink: 0;
}
.driver-bar-desc {
  font-size: 9px;
  color: #475569;
  margin-left: 148px;
  margin-top: -4px;
  margin-bottom: 6px;
}

/* カレンダー効果パネル */
.calendar-panel {
  grid-column: 1;
  grid-row: 2;
}
.calendar-wrap {
  flex: 1;
  position: relative;
  min-height: 0;
}
.calendar-wrap canvas {
  width: 100% !important;
  height: 100% !important;
}

/* リスクシナリオパネル */
.risk-panel {
  grid-column: 2;
  grid-row: 2;
}
.risk-card {
  background: #0d1117;
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 8px;
}
.risk-card:hover {
  border-color: rgba(255,255,255,0.08);
}
.risk-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.risk-name {
  font-size: 12px;
  font-weight: 600;
  color: #e2e8f0;
}
.risk-prob {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 10px;
  color: #eab308;
  background: rgba(234,179,8,0.1);
  padding: 1px 6px;
  border-radius: 3px;
}
.risk-detail {
  font-size: 11px;
  color: #94a3b8;
  margin-top: 4px;
}
.risk-detail .risk-impact { color: #ef4444; font-family: 'SF Mono', monospace; font-weight: 500; }
.risk-detail .risk-el { color: #eab308; font-family: 'SF Mono', monospace; font-weight: 500; }
.risk-trigger {
  font-size: 9px;
  color: #475569;
  margin-top: 3px;
}

/* 都道府県配分パネル */
.pref-panel {
  grid-column: 1 / -1;
  grid-row: 3;
  padding: 12px 16px;
}
.pref-bars {
  display: flex;
  gap: 6px;
  align-items: flex-end;
  flex-wrap: wrap;
}
.pref-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 50px;
}
.pref-bar-outer {
  width: 32px;
  height: 60px;
  background: #1e293b;
  border-radius: 3px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
}
.pref-bar-fill {
  width: 100%;
  border-radius: 3px;
  background: linear-gradient(180deg, #3b82f6, #1d4ed8);
}
.pref-label {
  font-size: 10px;
  color: #94a3b8;
  margin-top: 4px;
  text-align: center;
}
.pref-pct {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 9px;
  color: #64748b;
  margin-top: 1px;
}

/* ステータスバー */
.status-bar {
  background: #0d1117;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 4px 16px;
  font-size: 10px;
  color: #475569;
  display: flex;
  gap: 16px;
  flex-shrink: 0;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  flex-wrap: wrap;
}

.up { color: #22c55e; }
.down { color: #ef4444; }

.csv-export-btn {
  background: rgba(59,130,246,0.15);
  color: #3b82f6;
  border: 1px solid rgba(59,130,246,0.3);
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 10px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  cursor: pointer;
  margin-left: auto;
  flex-shrink: 0;
}
.csv-export-btn:hover {
  background: rgba(59,130,246,0.25);
}

.freshness-indicator {
  color: #22c55e;
}

@media (max-width: 768px) {
  .main-grid {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
  }
  .forecast-panel { grid-column: 1; grid-row: auto; }
  .driver-panel { grid-column: 1; grid-row: auto; }
  .calendar-panel { grid-column: 1; grid-row: auto; }
  .risk-panel { grid-column: 1; grid-row: auto; }
  .pref-panel { grid-column: 1; grid-row: auto; }
  .panel { min-height: 300px; }
}
</style>
</head>

  </div>

  <!-- 推奨アクション -->
  <div class="panel" style="grid-column: 1 / -1;">

  </div>

  <div class="panel" style="grid-column: 1 / -1;">
    <div class="panel-title">人員配置シミュレーター</div>

  </div>

  <!-- 簡易P/L概算 -->
  <div class="panel" style="grid-column: 1 / -1;">
    <div class="panel-title">簡易P/L概算</div>
    <div id="pl-panel"></div>
  </div>

    <div class="panel-title">都道府県別配分</div>
    <div class="pref-bars" id="pref-bars"></div>
  </div>
</div>

<div class="status-bar" id="status-bar"></div>

/* ===== 月次予測生成（国別） ===== */
function generateForecast(profile) {
  try {
    var labels = [];
    var base = [];
    var p10 = [];
    var p90 = [];
    var months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
    var year = 2026;
    var month = 4;
    var i, m, cal, b, halfBand;
    for (i = 0; i < 21; i++) {
      m = month + i;
      var y = year + Math.floor((m - 1) / 12);
      var mm = ((m - 1) % 12) + 1;
      labels.push(y + '/' + (mm < 10 ? '0' : '') + mm);
      cal = profile.calendar[mm] || 1.0;
      /* トレンド: 年1%成長 */
      var trend = 1.0 + (i / 12) * 0.01;
      b = Math.round((profile.base / 10000) * cal * trend * 10) / 10;
      halfBand = profile.band / 2;
      base.push(b);
      p10.push(Math.round(b * (1 - halfBand) * 10) / 10);
      p90.push(Math.round(b * (1 + halfBand) * 10) / 10);
    }
    return {labels: labels, base: base, p10: p10, p90: p90};
  } catch(e) { return {labels: [], base: [], p10: [], p90: []}; }
}

/* ===== URLパラメータ取得 ===== */
function getCountryCode() {
  try {
    var params = window.location.search.substring(1).split('&');
    var i, pair;
    for (i = 0; i < params.length; i++) {
      pair = params[i].split('=');
      if (pair[0] === 'country') return decodeURIComponent(pair[1]);
    }
    return 'CN';
  } catch(e) { return 'CN'; }
}

/* ===== 描画関数 ===== */
var forecastChartInstance = null;
var calendarChartInstance = null;

function renderForecastChart(profile) {
  try {
    var fc = generateForecast(profile);
    var ctx = document.getElementById('forecastChart').getContext('2d');
    if (forecastChartInstance) { forecastChartInstance.destroy(); }

    /* 統計 */
    var baseSum = 0, p10Sum = 0, p90Sum = 0;
    var i;
    for (i = 0; i < fc.base.length; i++) {
      baseSum += fc.base[i];
      p10Sum += fc.p10[i];
      p90Sum += fc.p90[i];
    }
    var baseAvg = (baseSum / fc.base.length).toFixed(1);
    var p10Avg = (p10Sum / fc.p10.length).toFixed(1);
    var p90Avg = (p90Sum / fc.p90.length).toFixed(1);
    var bw = (((p90Avg - p10Avg) / baseAvg) * 100).toFixed(1);

    document.getElementById('forecast-stats').innerHTML =
      '<div class="forecast-stat"><span class="forecast-stat-label">p50</span><span class="forecast-stat-value base-val">' + baseAvg + '\u4E07\u4EBA/\u6708</span></div>' +
      '<div class="forecast-stat"><span class="forecast-stat-label">p10</span><span class="forecast-stat-value pessimistic-val">' + p10Avg + '\u4E07\u4EBA</span></div>' +
      '<div class="forecast-stat"><span class="forecast-stat-label">p90</span><span class="forecast-stat-value optimistic-val">' + p90Avg + '\u4E07\u4EBA</span></div>' +
      '<div class="forecast-stat"><span class="forecast-stat-label">\u5E2F\u5E45</span><span class="forecast-stat-value band-val">' + bw + '%</span></div>';

    forecastChartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: fc.labels,
        datasets: [
          {
            label: '\u697D\u89B3 (p90)',

            borderWidth: 1,

            tension: 0.3,

function updateWhatIf() {
  try {
    var code = getCountryCode();
    var profile = COUNTRY_PROFILES[code] || COUNTRY_PROFILES['CN'];
    var base = profile.base;
    var fxVal = parseFloat(document.getElementById('wif_fx').value);
    var gdpVal = parseFloat(document.getElementById('wif_gdp').value);
    var geoVal = parseFloat(document.getElementById('wif_geo').value);
    var fltVal = parseFloat(document.getElementById('wif_flt').value);

    document.getElementById('wif_v_fx').textContent = (fxVal>=0?'+':'') + fxVal + '%';
    document.getElementById('wif_v_gdp').textContent = (gdpVal>=0?'+':'') + gdpVal + '%pt';
    document.getElementById('wif_v_geo').textContent = (geoVal>=0?'+':'') + geoVal + 'pt';
    document.getElementById('wif_v_flt').textContent = (fltVal>=0?'+':'') + fltVal + '%';

    /* 簡易感度モデル (MCエンジンの弾性値ベース) */
    var fxEla = -1.1;
    var gdpEla = 1.24;
    var geoCoef = -0.038;
    var fltEla = 0.60;
    var logImpact = -fxEla * Math.log(1 + fxVal/100) + gdpEla * Math.log(1 + gdpVal/100) + geoCoef * geoVal + fltEla * Math.log(1 + fltVal/100);
    var newBase = base * Math.exp(logImpact);
    var changePct = (newBase - base) / base * 100;
    var changeSign = changePct >= 0 ? '+' : '';
    var changeColor = changePct >= 0 ? '#4ade80' : '#f87171';

    document.getElementById('wif_result').textContent = (newBase/10000).toFixed(1) + '万人/月';
    document.getElementById('wif_result').style.color = changePct >= 0 ? '#3b82f6' : '#ef4444';
    document.getElementById('wif_change').innerHTML = '<span style="color:' + changeColor + '">' + changeSign + changePct.toFixed(1) + '% (' + changeSign + Math.round((newBase-base)/10000*10)/10 + '万人)</span>';
  } catch(e) {}
}

/* 人員配置シミュレーター */
function renderStaffingPanel(profile) {
  try {
    var container = document.getElementById('staffing-panel');
    var base = profile.base;
    var band = profile.band;
    var baseP10 = base * (1 - band/2);
    var baseP90 = base * (1 + band/2);

    /* 来訪者数から必要人員を逆算 */
    /* 30室旅館の場合: フロント2名/シフト、清掃は10室/人、調理は20食/人 */
    var roomsDefault = 30;
    var avgLOS = 4.5;
    var guestsPerRoom = 1.8;

    function calcStaff(visitors, rooms) {
      var roomNights = visitors * avgLOS / guestsPerRoom / 30;
      var occ = Math.min(roomNights / rooms, 1.0);
      var occupiedRooms = Math.round(rooms * occ);
      var guests = Math.round(occupiedRooms * guestsPerRoom);
      return {
        occ: (occ * 100).toFixed(0),
        rooms: occupiedRooms,
        guests: guests,
        front: Math.max(2, Math.ceil(guests / 15)),
        clean: Math.max(1, Math.ceil(occupiedRooms / 10)),
        cook: Math.max(1, Math.ceil(guests * 0.7 / 20)),
        lang: Math.max(1, Math.ceil(guests * 0.6 / 25))
      };
    }

    var sBase = calcStaff(base / 10000, roomsDefault);
    var sP10 = calcStaff(baseP10 / 10000, roomsDefault);
    var sP90 = calcStaff(baseP90 / 10000, roomsDefault);

    var html = '<div style="font-size:11px;color:#64748b;margin-bottom:8px;">前提: 客室30室 | LOS=' + avgLOS.toFixed(1) + '泊 | 1室' + guestsPerRoom + '名</div>';
    html += '<table class="data-table" style="font-size:12px;"><thead><tr>';
    html += '<th style="width:140px;">職種</th><th style="text-align:right;">悲観</th><th style="text-align:right;">ベース</th><th style="text-align:right;">楽観</th><th style="text-align:right;">基準</th>';
    html += '</tr></thead><tbody>';

    var roles = [
      {name:'フロント', key:'front', unit:'名/シフト', basis:'15名/1人'},
      {name:'清掃', key:'clean', unit:'名', basis:'10室/1人'},
      {name:'調理', key:'cook', unit:'名', basis:'20食/1人'},
      {name:'多言語スタッフ', key:'lang', unit:'名', basis:'25名/1人'}
    ];

    for (var ri = 0; ri < roles.length; ri++) {
      var r = roles[ri];
      html += '<tr>';
      html += '<td style="color:#94a3b8;font-weight:600;">' + r.name + '</td>';
      html += '<td style="text-align:right;" class="td-mono td-neg">' + sP10[r.key] + r.unit + '</td>';
      html += '<td style="text-align:right;" class="td-mono">' + sBase[r.key] + r.unit + '</td>';
      html += '<td style="text-align:right;" class="td-mono td-pos">' + sP90[r.key] + r.unit + '</td>';
      html += '<td style="text-align:right;color:#475569;font-size:10px;">' + r.basis + '</td>';
      html += '</tr>';
    }

    html += '<tr style="border-top:1px solid rgba(255,255,255,0.08);">';
    html += '<td style="color:#e2e8f0;font-weight:700;">合計人員</td>';
    var totalP10 = sP10.front + sP10.clean + sP10.cook + sP10.lang;
    var totalBase = sBase.front + sBase.clean + sBase.cook + sBase.lang;
    var totalP90 = sP90.front + sP90.clean + sP90.cook + sP90.lang;
    html += '<td style="text-align:right;" class="td-mono td-neg">' + totalP10 + '名</td>';
    html += '<td style="text-align:right;" class="td-mono" style="color:#3b82f6;font-weight:700;">' + totalBase + '名</td>';
    html += '<td style="text-align:right;" class="td-mono td-pos">' + totalP90 + '名</td>';
    html += '<td></td></tr>';

    html += '<tr>';
    html += '<td style="color:#94a3b8;font-weight:600;">推定稼働率</td>';
    html += '<td style="text-align:right;" class="td-mono td-neg">' + sP10.occ + '%</td>';
    html += '<td style="text-align:right;" class="td-mono">' + sBase.occ + '%</td>';
    html += '<td style="text-align:right;" class="td-mono td-pos">' + sP90.occ + '%</td>';
    html += '<td></td></tr>';

    html += '</tbody></table>';

    container.innerHTML = html;
  } catch(e) { console.error('renderStaffingPanel:', e); }
}

/* ===== 曜日別需要パターン ===== */
function renderWeekdayPanel(profile) {
  try {
    var code = getCountryCode();
    var wm = WEEKEND_MULTIPLIER[code] || 1.0;
    var fri = 1.0 + (wm - 1.0) * 0.5; /* 金曜は平日と週末の中間 */
    var days = [
      {label: '\u6708', val: 1.0},
      {label: '\u706B', val: 1.0},
      {label: '\u6C34', val: 1.0},
      {label: '\u6728', val: 1.0},
      {label: '\u91D1', val: Math.round(fri * 100) / 100},
      {label: '\u571F', val: wm},
      {label: '\u65E5', val: wm}
    ];

    /* SVGバーチャート */
    var barW = 48;
    var gap = 8;
    var chartH = 120;
    var svgW = days.length * (barW + gap) - gap;
    var maxVal = 0;
    var i;
    for (i = 0; i < days.length; i++) {
      if (days[i].val > maxVal) maxVal = days[i].val;
    }
    maxVal = Math.max(maxVal, 1.5);

    var svg = '<svg width="' + svgW + '" height="' + (chartH + 40) + '" style="display:block;margin:0 auto;">';

    /* ベースライン (1.0) */
    var baseY = chartH - (1.0 / maxVal) * chartH;
    svg += '<line x1="0" y1="' + baseY + '" x2="' + svgW + '" y2="' + baseY + '" stroke="rgba(255,255,255,0.15)" stroke-dasharray="4,4" stroke-width="1"/>';
    svg += '<text x="' + (svgW - 2) + '" y="' + (baseY - 4) + '" fill="#64748b" font-size="9" text-anchor="end" font-family="SF Mono,monospace">1.00x</text>';

    for (i = 0; i < days.length; i++) {
      var d = days[i];
      var x = i * (barW + gap);
      var barH = (d.val / maxVal) * chartH;
      var y = chartH - barH;
      var color;
      if (i >= 5) { color = '#f59e0b'; }      /* 週末: amber */
      else if (i === 4) { color = '#38bdf8'; } /* 金曜: sky */
      else { color = '#3b82f6'; }               /* 平日: blue */

      svg += '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="' + barH + '" rx="3" fill="' + color + '" opacity="0.85"/>';
      svg += '<text x="' + (x + barW / 2) + '" y="' + (y - 4) + '" fill="#e2e8f0" font-size="11" text-anchor="middle" font-family="SF Mono,monospace">' + d.val.toFixed(2) + 'x</text>';
      svg += '<text x="' + (x + barW / 2) + '" y="' + (chartH + 16) + '" fill="' + (i >= 5 ? '#f59e0b' : '#94a3b8') + '" font-size="13" text-anchor="middle" font-weight="600">' + d.label + '</text>';
    }

    svg += '</svg>';

    var html = '<div style="text-align:center;margin-bottom:8px;">';
    html += '<span style="font-size:11px;color:#94a3b8;">週末倍率: </span>';
    html += '<span style="font-family:SF Mono,monospace;font-size:14px;font-weight:700;color:' + (wm >= 1.0 ? '#f59e0b' : '#3b82f6') + ';">' + wm.toFixed(2) + 'x</span>';
    html += '<span style="font-size:11px;color:#64748b;margin-left:12px;">(' + (profile.name || code) + ')</span>';
    html += '</div>';
    html += svg;

    document.getElementById('weekday-panel').innerHTML = html;
  } catch(e) { console.error('renderWeekdayPanel:', e); }
}

/* ===== 推奨アクション ===== */
function renderActionPanel(profile) {
  try {
    var code = getCountryCode();
    var actions = [];
    var ruleKey;
    for (ruleKey in ACTION_RULES) {
      if (!ACTION_RULES.hasOwnProperty(ruleKey)) continue;
      var rule = ACTION_RULES[ruleKey];
      var score = rule.check(profile, code);
      if (score > 0) {
        for (var ai = 0; ai < rule.actions.length; ai++) {
          actions.push({
            text: rule.actions[ai].text,
            priority: rule.actions[ai].priority,
            score: score,
            category: ruleKey
          });
        }
      }
    }

    /* 優先度でソート (P0 > P1 > P2) */
    actions.sort(function(a, b) {
      if (a.priority < b.priority) return -1;
      if (a.priority > b.priority) return 1;
      return b.score - a.score;
    });

    /* 最大5件 */
    if (actions.length > 5) actions = actions.slice(0, 5);

    if (actions.length === 0) {
      document.getElementById('action-panel').innerHTML = '<div style="color:#64748b;font-size:12px;">現在の条件では特記すべき推奨アクションはありません</div>';
      return;
    }

    var priorityColors = {
      'P0': {bg: 'rgba(239,68,68,0.15)', border: 'rgba(239,68,68,0.4)', text: '#f87171'},
      'P1': {bg: 'rgba(234,179,8,0.12)', border: 'rgba(234,179,8,0.35)', text: '#facc15'},
      'P2': {bg: 'rgba(59,130,246,0.10)', border: 'rgba(59,130,246,0.3)', text: '#60a5fa'}
    };

    var html = '';
    for (var i = 0; i < actions.length; i++) {
      var a = actions[i];
      var pc = priorityColors[a.priority] || priorityColors['P2'];
      html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:6px;background:' + pc.bg + ';border:1px solid ' + pc.border + ';border-radius:6px;">';
      html += '<span style="font-family:SF Mono,monospace;font-size:10px;font-weight:700;color:' + pc.text + ';background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:3px;flex-shrink:0;">' + a.priority + '</span>';
      html += '<span style="font-size:12px;color:#e2e8f0;">' + a.text + '</span>';
      html += '</div>';
    }

    document.getElementById('action-panel').innerHTML = html;
  } catch(e) { console.error('renderActionPanel:', e); }
}

  try {
    var html = '<span>CIC: ' + profile.cic.toFixed(3) + '</span>' +
      '<span>TFI: ' + profile.tfi.toFixed(1) + '</span>' +
      '<span>\u5E2F\u5E45\u4FC2\u6570: ' + (profile.band * 100).toFixed(0) + '%</span>' +
      '<span>\u30D9\u30FC\u30B9: ' + (profile.base / 10000).toFixed(1) + '\u4E07\u4EBA/\u6708</span>' +
      '<span>model: full_mc_29vars</span>' +
      '<span>N: 3,000</span>' +
      '<span class="freshness-indicator">\u6700\u7D42\u66F4\u65B0: 2026-04-05</span>';
    document.getElementById('status-bar').innerHTML = html;
  } catch(e) {}
}

/* ===== CSV出力 ===== */
function exportForecastCSV() {
  try {
    var code = getCountryCode();
    var profile = COUNTRY_PROFILES[code];
    if (!profile) { profile = COUNTRY_PROFILES['CN']; }
    var fc = generateForecast(profile);
    var rows = ['\u5E74\u6708,p10(\u4E07\u4EBA),p50(\u4E07\u4EBA),p90(\u4E07\u4EBA)'];
    var i;
    for (i = 0; i < fc.labels.length; i++) {
      rows.push(fc.labels[i] + ',' + fc.p10[i] + ',' + fc.base[i] + ',' + fc.p90[i]);
    }
    var bom = '\uFEFF';
    var blob = new Blob([bom + rows.join('\n')], {type: 'text/csv;charset=utf-8;'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'forecast_' + (profile.name || code) + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) { console.error('exportForecastCSV:', e); }
}

/* ===== 初期化 ===== */
function init() {
  try {
    var code = getCountryCode();
    var profile = COUNTRY_PROFILES[code];
    if (!profile) { profile = COUNTRY_PROFILES['CN']; code = 'CN'; }

    document.getElementById('page-title').innerHTML = profile.flag + ' ' + profile.name + ' \u2014 \u8A73\u7D30\u5206\u6790';
    document.title = 'SCRI Terminal - ' + profile.name + ' \u8A73\u7D30';

    renderForecastChart(profile);
    renderDriverBars(profile);
    renderCalendarChart(profile);
    renderRiskCards(profile);
    renderWeekdayPanel(profile);
    renderActionPanel(profile);
    renderWhatIf(profile);
    renderStaffingPanel(profile);
    renderPrefBars(profile);
    renderStatusBar(profile);
  } catch(e) { console.error('init:', e); }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
