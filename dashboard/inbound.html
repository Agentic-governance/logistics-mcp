<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCRI Terminal - インバウンド観光需要予測</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0f;
  color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.terminal-header {
  background: #0d1117;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  flex-shrink: 0;
}
.terminal-header .logo {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-weight: 700;
  color: #3b82f6;
  letter-spacing: 0.05em;
}
.terminal-header .title {
  color: #94a3b8;
  font-weight: 400;
}
.terminal-header .live-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #22c55e;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}
.terminal-header .live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #22c55e;
  animation: blink 1.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.left-panel {
  width: 280px;
  border-right: 1px solid rgba(255,255,255,0.06);
  overflow-y: auto;
  padding: 8px;
  flex-shrink: 0;
}
.left-panel::-webkit-scrollbar { width: 4px; }
.left-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.left-panel::-webkit-scrollbar-track { background: transparent; }

.panel-title {
  font-size: 10px;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 8px 8px 4px;
}

.var-card {
  background: #0d1117;
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 6px;
  transition: border-color 0.15s;
  cursor: default;
}
.var-card:hover {
  border-color: rgba(255,255,255,0.12);
}
.var-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.var-name {
  font-size: 11px;
  font-weight: 600;
  color: #94a3b8;
}
.var-badge {
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.var-badge.cat-fx { background: rgba(59,130,246,0.15); color: #60a5fa; }
.var-badge.cat-econ { background: rgba(168,85,247,0.15); color: #a78bfa; }
.var-badge.cat-geo { background: rgba(239,68,68,0.15); color: #f87171; }
.var-badge.cat-supply { background: rgba(34,197,94,0.15); color: #4ade80; }
.var-badge.cat-consumer { background: rgba(234,179,8,0.15); color: #facc15; }
.var-badge.cat-finance { background: rgba(6,182,212,0.15); color: #22d3ee; }
.var-badge.cat-culture { background: rgba(236,72,153,0.15); color: #f472b6; }

.var-value {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 18px;
  font-weight: 600;
  color: #f8fafc;
  letter-spacing: -0.02em;
}
.var-change {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  font-weight: 500;
  margin-top: 2px;
}
.up { color: #22c55e; }
.down { color: #ef4444; }
.flat { color: #64748b; }

.var-impacts {
  margin-top: 6px;
  border-top: 1px solid rgba(255,255,255,0.04);
  padding-top: 4px;
}
.impact-row {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  padding: 1px 0;
  color: #64748b;
}
.impact-row span:last-child {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-weight: 500;
}

.center-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 16px;
}
.chart-stats {
  display: flex;
  gap: 24px;
  margin-bottom: 12px;
  font-size: 12px;
  flex-wrap: wrap;
}
.chart-stat {
  display: flex;
  flex-direction: column;
}
.chart-stat-label {
  font-size: 10px;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.chart-stat-value {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.chart-stat-value.base-val { color: #3b82f6; }
.chart-stat-value.pessimistic-val { color: #ef4444; }
.chart-stat-value.optimistic-val { color: #22c55e; }
.chart-stat-value.band-val { color: #eab308; }

.chart-container {
  flex: 1;
  position: relative;
  min-height: 0;
}
.chart-container canvas {
  width: 100% !important;
  height: 100% !important;
}

.right-panel {
  width: 300px;
  border-left: 1px solid rgba(255,255,255,0.06);
  overflow-y: auto;
  padding: 8px;
  flex-shrink: 0;
}
.right-panel::-webkit-scrollbar { width: 4px; }
.right-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.right-panel::-webkit-scrollbar-track { background: transparent; }

.country-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 6px;
  transition: background 0.15s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
}
.country-row:hover {
  background: rgba(255,255,255,0.03);
}
.country-flag {
  font-size: 20px;
  flex-shrink: 0;
}
.country-info {
  flex: 1;
  min-width: 0;
}
.country-name {
  font-size: 12px;
  font-weight: 600;
  color: #e2e8f0;
}
.country-visitors {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  color: #94a3b8;
}
.country-band {
  width: 60px;
  height: 4px;
  background: #1e293b;
  border-radius: 2px;
  position: relative;
  flex-shrink: 0;
}
.country-band-fill {
  position: absolute;
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, #ef4444 0%, #3b82f6 50%, #22c55e 100%);
}
.country-band-marker {
  position: absolute;
  top: -2px;
  width: 2px;
  height: 8px;
  background: #f8fafc;
  border-radius: 1px;
  transform: translateX(-1px);
}
.country-change {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  font-weight: 600;
  width: 55px;
  text-align: right;
  flex-shrink: 0;
}
.detail-link {
  font-size: 10px;
  color: #3b82f6;
  text-decoration: none;
  flex-shrink: 0;
}
.detail-link:hover { text-decoration: underline; }

.summary-section {
  margin-top: 12px;
  padding: 10px 12px;
  background: #0d1117;
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 6px;
}
.summary-title {
  font-size: 10px;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.summary-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  padding: 2px 0;
}
.summary-row .label { color: #94a3b8; }
.summary-row .value {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-weight: 500;
  color: #e2e8f0;
}

.status-bar {
  background: #0d1117;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 4px 16px;
  font-size: 10px;
  color: #475569;
  display: flex;
  gap: 16px;
  flex-shrink: 0;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  flex-wrap: wrap;
}
.status-item { white-space: nowrap; }
.status-item .status-label { color: #334155; }
.status-item .status-value { color: #64748b; }
</style>
</head>
<body>

<div class="terminal-header">
  <span class="logo">SCRI Terminal</span>
  <span class="title">インバウンド観光需要予測</span>
  <span class="live-indicator">
    <span class="live-dot"></span>
    <span id="clock">--:-- JST</span>
  </span>
</div>

<div class="main-layout">
  <div class="left-panel">
    <div class="panel-title">ドライバー変数</div>
    <div id="driver-cards"></div>
  </div>

  <div class="center-panel">
    <div class="chart-stats" id="chart-stats"></div>
    <div class="chart-container">
      <canvas id="mainChart"></canvas>
    </div>
  </div>

  <div class="right-panel">
    <div class="panel-title">国別インパクト</div>
    <div id="country-list"></div>
    <div class="summary-section" id="summary-section"></div>
  </div>
</div>

<div class="status-bar" id="status-bar"></div>

<script>
/* ===== フォールバックデータ ===== */
var DRIVER_DATA = [
  {id:'fx_usd', name:'USD/JPY', category:'\u70BA\u66FF', catClass:'cat-fx', value:'149.5', change:0.023, sigma:0.10,
   impacts:[{country:'KR',ela:-1.05},{country:'CN',ela:-0.95},{country:'US',ela:-1.18},{country:'AU',ela:-1.22},{country:'TW',ela:-0.80}]},
  {id:'fx_cny', name:'CNY/JPY', category:'\u70BA\u66FF', catClass:'cat-fx', value:'20.8', change:-0.012, sigma:0.05,
   impacts:[{country:'CN',ela:-0.95}]},
  {id:'fx_krw', name:'KRW/JPY', category:'\u70BA\u66FF', catClass:'cat-fx', value:'0.107', change:0.015, sigma:0.10,
   impacts:[{country:'KR',ela:-1.05}]},
  {id:'gdp_cn', name:'\u4E2D\u56FDGDP', category:'\u7D4C\u6E08', catClass:'cat-econ', value:'+4.8%', change:-0.005, sigma:0.020,
   impacts:[{country:'CN',ela:1.24}]},
  {id:'gdp_us', name:'\u7C73\u56FDGDP', category:'\u7D4C\u6E08', catClass:'cat-econ', value:'+2.1%', change:0.003, sigma:0.015,
   impacts:[{country:'US',ela:1.24}]},
  {id:'geo_cn', name:'\u65E5\u4E2D\u95A2\u4FC2', category:'\u5730\u653F\u5B66', catClass:'cat-geo', value:'55', change:-8, sigma:12.0,
   impacts:[{country:'CN',coef:-0.038},{country:'HK',coef:-0.038}]},
  {id:'geo_tw', name:'\u53F0\u6E7E\u6D77\u5CE1', category:'\u5730\u653F\u5B66', catClass:'cat-geo', value:'32', change:-5, sigma:8.0,
   impacts:[{country:'TW',coef:-0.038}]},
  {id:'flt_cn', name:'\u30D5\u30E9\u30A4\u30C8(\u65E5\u4E2D)', category:'\u4F9B\u7D66', catClass:'cat-supply', value:'75%', change:0.05, sigma:0.10,
   impacts:[{country:'CN',ela:0.60}]},
  {id:'flt_kr', name:'\u30D5\u30E9\u30A4\u30C8(\u65E5\u97D3)', category:'\u4F9B\u7D66', catClass:'cat-supply', value:'98%', change:0.03, sigma:0.06,
   impacts:[{country:'KR',ela:0.60}]},
  {id:'cci_kr', name:'\u97D3\u56FDCCI', category:'\u6D88\u8CBB\u8005', catClass:'cat-consumer', value:'100.2', change:2.5, sigma:5.0,
   impacts:[{country:'KR',coef:0.012}]},
  {id:'stk_cn', name:'\u4E2D\u56FD\u682A', category:'\u91D1\u878D', catClass:'cat-finance', value:'-5.2%', change:-0.052, sigma:0.28,
   impacts:[{country:'CN',coef:0.08}]},
  {id:'clt_cn', name:'\u65E5\u672C\u95A2\u5FC3(\u4E2D\u56FD)', category:'\u6587\u5316', catClass:'cat-culture', value:'72', change:-3, sigma:10.0,
   impacts:[{country:'CN',coef:0.010}]}
];

var COUNTRY_DATA = [
  {code:'KR', name:'\u97D3\u56FD', flag:'\uD83C\uDDF0\uD83C\uDDF7', base:716000, band:0.23, changePct:5.0},
  {code:'CN', name:'\u4E2D\u56FD', flag:'\uD83C\uDDE8\uD83C\uDDF3', base:433000, band:0.55, changePct:-8.2},
  {code:'TW', name:'\u53F0\u6E7E', flag:'\uD83C\uDDF9\uD83C\uDDFC', base:425000, band:0.28, changePct:3.1},
  {code:'US', name:'\u7C73\u56FD', flag:'\uD83C\uDDFA\uD83C\uDDF8', base:195000, band:0.20, changePct:12.0},
  {code:'HK', name:'\u9999\u6E2F', flag:'\uD83C\uDDED\uD83C\uDDF0', base:182000, band:0.40, changePct:-4.5},
  {code:'TH', name:'\u30BF\u30A4', flag:'\uD83C\uDDF9\uD83C\uDDED', base:148000, band:0.30, changePct:6.8},
  {code:'AU', name:'\u8C6A\u5DDE', flag:'\uD83C\uDDE6\uD83C\uDDFA', base:72000, band:0.22, changePct:9.0},
  {code:'SG', name:'\u30B7\u30F3\u30AC\u30DD\u30FC\u30EB', flag:'\uD83C\uDDF8\uD83C\uDDEC', base:52000, band:0.18, changePct:7.5}
];

var FORECAST_LABELS = [
  '2026/04','2026/05','2026/06','2026/07','2026/08','2026/09',
  '2026/10','2026/11','2026/12','2027/01','2027/02','2027/03',
  '2027/04','2027/05','2027/06','2027/07','2027/08','2027/09',
  '2027/10','2027/11','2027/12'
];
var FORECAST_BASE = [242,268,251,264,272,248,285,262,245,218,205,240,250,275,258,270,280,255,295,270,252];
var FORECAST_P10 =  [213,232,215,226,233,211,243,223,208,183,171,202,210,232,217,228,237,215,250,228,212];
var FORECAST_P90 =  [275,308,291,306,316,288,332,305,286,257,243,282,294,322,303,318,328,299,345,316,296];

/* ===== ユーティリティ ===== */
function calcImpact(imp, change) {
  try {
    if (typeof imp.ela !== 'undefined') {
      return -imp.ela * change;
    }
    if (typeof imp.coef !== 'undefined') {
      return imp.coef * change;
    }
    return 0;
  } catch(e) { return 0; }
}

function formatImpact(val) {
  try {
    var pct = val * 100;
    var sign = pct >= 0 ? '+' : '';
    return sign + pct.toFixed(1) + '%';
  } catch(e) { return '0.0%'; }
}

function impactClass(val) {
  try {
    if (val > 0.001) return 'up';
    if (val < -0.001) return 'down';
    return 'flat';
  } catch(e) { return 'flat'; }
}

/* ===== 時計 ===== */
function updateClock() {
  try {
    var now = new Date();
    var jst = new Date(now.getTime() + (9 * 60 - now.getTimezoneOffset()) * 60000);
    var h = jst.getHours();
    var m = jst.getMinutes();
    var s = jst.getSeconds();
    var hh = h < 10 ? '0' + h : '' + h;
    var mm = m < 10 ? '0' + m : '' + m;
    var ss = s < 10 ? '0' + s : '' + s;
    document.getElementById('clock').textContent = hh + ':' + mm + ':' + ss + ' JST';
  } catch(e) {}
}

/* ===== 左パネル: ドライバー変数カード ===== */
function renderDriverCards() {
  try {
    var container = document.getElementById('driver-cards');
    var html = '';
    var i, j, d, imp, impVal, impCls;
    for (i = 0; i < DRIVER_DATA.length; i++) {
      d = DRIVER_DATA[i];
      var changeDir = d.change >= 0 ? 'up' : 'down';
      var changeArrow = d.change >= 0 ? '\u25B2' : '\u25BC';
      var changeStr;
      if (d.id.indexOf('geo_') === 0 || d.id.indexOf('cci_') === 0 || d.id.indexOf('clt_') === 0) {
        changeStr = changeArrow + ' ' + (d.change >= 0 ? '+' : '') + d.change + 'pt';
      } else if (d.id.indexOf('stk_') === 0) {
        changeStr = changeArrow + ' ' + (d.change * 100).toFixed(1) + '%';
      } else {
        changeStr = changeArrow + ' ' + (d.change >= 0 ? '+' : '') + (d.change * 100).toFixed(1) + '%';
      }

      var impactsHtml = '';
      for (j = 0; j < d.impacts.length; j++) {
        imp = d.impacts[j];
        impVal = calcImpact(imp, d.change);
        impCls = impactClass(impVal);
        impactsHtml += '<div class="impact-row">' +
          '<span>\u2192 ' + imp.country + '</span>' +
          '<span class="' + impCls + '">' + formatImpact(impVal) + '</span>' +
          '</div>';
      }

      html += '<div class="var-card">' +
        '<div class="var-header">' +
          '<span class="var-name">' + d.name + '</span>' +
          '<span class="var-badge ' + d.catClass + '">' + d.category + '</span>' +
        '</div>' +
        '<div class="var-value">' + d.value + '</div>' +
        '<div class="var-change ' + changeDir + '">' + changeStr + '</div>' +
        '<div class="var-impacts">' + impactsHtml + '</div>' +
      '</div>';
    }
    container.innerHTML = html;
  } catch(e) { console.error('renderDriverCards:', e); }
}

/* ===== 右パネル: 国別リスト ===== */
function renderCountryList() {
  try {
    var container = document.getElementById('country-list');
    var html = '';
    var i, c;
    for (i = 0; i < COUNTRY_DATA.length; i++) {
      c = COUNTRY_DATA[i];
      var visitors = (c.base / 10000).toFixed(1);
      var changeDir = c.changePct >= 0 ? 'up' : 'down';
      var changeStr = (c.changePct >= 0 ? '+' : '') + c.changePct.toFixed(1) + '%';
      var bandWidth = Math.min(c.band * 100, 90);
      var bandLeft = 50 - bandWidth / 2;

      html += '<a class="country-row" href="inbound-detail.html?country=' + c.code + '">' +
        '<div class="country-flag">' + c.flag + '</div>' +
        '<div class="country-info">' +
          '<div class="country-name">' + c.name + '</div>' +
          '<div class="country-visitors">' + visitors + '\u4E07\u4EBA/\u6708</div>' +
        '</div>' +
        '<div class="country-band">' +
          '<div class="country-band-fill" style="left:' + bandLeft + '%;width:' + bandWidth + '%"></div>' +
          '<div class="country-band-marker" style="left:50%"></div>' +
        '</div>' +
        '<div class="country-change ' + changeDir + '">' + changeStr + '</div>' +
        '<div class="detail-link">\u8A73\u7D30\u2192</div>' +
      '</a>';
    }
    container.innerHTML = html;

    var totalBase = 0;
    for (i = 0; i < COUNTRY_DATA.length; i++) {
      totalBase += COUNTRY_DATA[i].base;
    }
    var summaryHtml = '<div class="summary-title">\u65E5\u672C\u5168\u4F53</div>' +
      '<div class="summary-row"><span class="label">\u6708\u9593\u6765\u8A2A\u8005\u6570</span><span class="value">' + (totalBase / 10000).toFixed(1) + '\u4E07\u4EBA/\u6708</span></div>' +
      '<div class="summary-row"><span class="label">p10</span><span class="value">' + (totalBase * 0.878 / 10000).toFixed(1) + '\u4E07\u4EBA</span></div>' +
      '<div class="summary-row"><span class="label">p90</span><span class="value">' + (totalBase * 1.136 / 10000).toFixed(1) + '\u4E07\u4EBA</span></div>';
    document.getElementById('summary-section').innerHTML = summaryHtml;
  } catch(e) { console.error('renderCountryList:', e); }
}

/* ===== チャート統計 ===== */
function renderChartStats() {
  try {
    var baseAvg = 0, p10Avg = 0, p90Avg = 0;
    var i;
    for (i = 0; i < FORECAST_BASE.length; i++) {
      baseAvg += FORECAST_BASE[i];
      p10Avg += FORECAST_P10[i];
      p90Avg += FORECAST_P90[i];
    }
    baseAvg = (baseAvg / FORECAST_BASE.length).toFixed(1);
    p10Avg = (p10Avg / FORECAST_P10.length).toFixed(1);
    p90Avg = (p90Avg / FORECAST_P90.length).toFixed(1);
    var bandWidth = (((p90Avg - p10Avg) / baseAvg) * 100).toFixed(1);

    var html = '<div class="chart-stat">' +
        '<span class="chart-stat-label">\u30D9\u30FC\u30B9</span>' +
        '<span class="chart-stat-value base-val">' + baseAvg + '\u4E07\u4EBA</span>' +
      '</div>' +
      '<div class="chart-stat">' +
        '<span class="chart-stat-label">\u60B2\u89B3 (p10)</span>' +
        '<span class="chart-stat-value pessimistic-val">' + p10Avg + '\u4E07\u4EBA</span>' +
      '</div>' +
      '<div class="chart-stat">' +
        '<span class="chart-stat-label">\u697D\u89B3 (p90)</span>' +
        '<span class="chart-stat-value optimistic-val">' + p90Avg + '\u4E07\u4EBA</span>' +
      '</div>' +
      '<div class="chart-stat">' +
        '<span class="chart-stat-label">\u5E2F\u5E45</span>' +
        '<span class="chart-stat-value band-val">' + bandWidth + '%</span>' +
      '</div>';
    document.getElementById('chart-stats').innerHTML = html;
  } catch(e) { console.error('renderChartStats:', e); }
}

/* ===== メインチャート ===== */

    if (mainChartInstance) { mainChartInstance.destroy(); }

    mainChartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: FORECAST_LABELS,
        datasets: [
          {
            label: '\u697D\u89B3 (p90)',
            data: FORECAST_P90,
            borderColor: 'rgba(34,197,94,0.5)',
            backgroundColor: 'transparent',
            borderWidth: 1,
            borderDash: [4, 4],
            pointRadius: 0,
            fill: false,
            tension: 0.3,
            order: 2
          },
          {
            label: '\u30D9\u30FC\u30B9 (p50)',
            data: FORECAST_BASE,
            borderColor: '#3b82f6',
            backgroundColor: 'transparent',
            borderWidth: 2.5,
            pointRadius: 2,
            pointBackgroundColor: '#3b82f6',
            fill: false,
            tension: 0.3,
            order: 1
          },
          {
            label: '\u60B2\u89B3 (p10)',
            data: FORECAST_P10,
            borderColor: 'rgba(239,68,68,0.5)',
            backgroundColor: 'transparent',
            borderWidth: 1,
            borderDash: [4, 4],
            pointRadius: 0,
            fill: false,
            tension: 0.3,
            order: 3
          },
          {
            label: '\u4FE1\u983C\u533A\u9593',
            data: FORECAST_P90,
            borderColor: 'transparent',
            backgroundColor: 'rgba(59,130,246,0.07)',
            borderWidth: 0,
            pointRadius: 0,
            fill: '+1',
            tension: 0.3,
            order: 4
          },
          {
            label: '_fill_bottom',
            data: FORECAST_P10,
            borderColor: 'transparent',
            backgroundColor: 'transparent',
            borderWidth: 0,
            pointRadius: 0,
            fill: false,
            tension: 0.3,
            order: 5
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {
          mode: 'index',
          intersect: false
        },
        plugins: {
          legend: {
            display: true,
            position: 'top',
            labels: {
              color: '#64748b',
              font: { size: 10, family: "'SF Mono', 'Fira Code', monospace" },
              usePointStyle: true,
              pointStyle: 'line',
              padding: 12,
              filter: function(item) {
                return item.text.indexOf('_') !== 0;
              }
            }
          },
          tooltip: {
            backgroundColor: '#1e293b',
            titleColor: '#e2e8f0',
            bodyColor: '#94a3b8',
            borderColor: 'rgba(255,255,255,0.1)',
            borderWidth: 1,
            titleFont: { family: "'SF Mono', monospace", size: 11 },
            bodyFont: { family: "'SF Mono', monospace", size: 11 },
            callbacks: {
              label: function(context) {
                try {
                  if (context.dataset.label.indexOf('_') === 0) return null;
                  if (context.dataset.label === '\u4FE1\u983C\u533A\u9593') return null;
                  return context.dataset.label + ': ' + context.parsed.y + '\u4E07\u4EBA';
                } catch(e) { return ''; }

/* ===== ステータスバー ===== */
function renderStatusBar() {
  try {
    var items = [
      {label:'model', value:'full_mc_29vars'},
      {label:'N', value:'3,000'},
      {label:'\u5909\u6570', value:'29'},
      {label:'\u76F8\u95A2\u884C\u5217', value:'29\u00D729'},
      {label:'\u975E\u5BFE\u79F0\u6BD4', value:'1.12'},
      {label:'CN\u5E2F\u5E45', value:'131%'},
      {label:'KR\u5E2F\u5E45', value:'46%'}
    ];
    var html = '';

/* ===== 初期化 ===== */
function init() {
  try {
    updateClock();
    setInterval(updateClock, 1000);
    renderDriverCards();
    renderCountryList();
    renderChartStats();
    renderMainChart();
    renderStatusBar();
  } catch(e) { console.error('init:', e); }
}

function loadFromAPI() {
  try {
    var ctrl = new AbortController();
    var timer = setTimeout(function(){ ctrl.abort(); }, 8000);
    fetch('/api/v1/tourism/three-scenarios?source_country=ALL', {signal: ctrl.signal})
      .then(function(r) { clearTimeout(timer); if(!r.ok) throw new Error(r.status); return r.json(); })
      .then(function(json) {
        try {
          var d = json.data || json;
          var s = d.scenarios || {};
          var base = (s.base||{}).median || [];
          var p10 = (s.pessimistic||{}).median || (s.base||{}).p10 || [];
          var p90 = (s.optimistic||{}).median || (s.base||{}).p90 || [];
          if (base.length > 0 && mainChart) {
            var ds = mainChart.data.datasets;
            for (var i=0; i<ds.length; i++) {
              var lb = ds[i].label || '';
              if (lb.indexOf('p10') >= 0 || lb.indexOf('悲観') >= 0) ds[i].data = p10.map(function(v){return Math.round(v/10000*10)/10;});
              else if (lb.indexOf('p90') >= 0 || lb.indexOf('楽観') >= 0) ds[i].data = p90.map(function(v){return Math.round(v/10000*10)/10;});
              else if (lb.indexOf('p50') >= 0 || lb.indexOf('ベース') >= 0) ds[i].data = base.map(function(v){return Math.round(v/10000*10)/10;});
              else if (lb.indexOf('上') >= 0) ds[i].data = (s.base.p90||p90).map(function(v){return Math.round(v/10000*10)/10;});
              else if (lb.indexOf('下') >= 0) ds[i].data = (s.base.p10||p10).map(function(v){return Math.round(v/10000*10)/10;});
            }
            mainChart.update();
            var badge = document.getElementById('liveBadge');
            if (badge) { badge.textContent = 'LIVE'; badge.style.color = '#22c55e'; }
            var modelEl = document.getElementById('modelInfo');
            if (modelEl) modelEl.textContent = 'model: ' + (d.model||'live');
          }
        } catch(e) { console.warn('APIデータ処理:', e.message); }
      })
      .catch(function(e) { console.warn('API:', e.message); });
  } catch(e) { console.warn('API接続:', e.message); }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function(){ init(); loadFromAPI(); });
} else {
  init();
  loadFromAPI();
}
</script>
